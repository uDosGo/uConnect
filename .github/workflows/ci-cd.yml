name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: write
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Run ESLint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test

  safety:
    name: Safety Check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Run safety checks
        run: bash scripts/check-a1-boundary.sh

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: safety
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Run database migrations
        run: bash scripts/run-migrations.sh
      - name: Run comprehensive validation
        run: node test/comprehensive-validation.test.js
      - name: Build Docker images
        run: |
          docker build -t udos/core -f core/Dockerfile .
          docker build -t udos/ui -f ui/Dockerfile .
          docker build -t udos/sonic -f tools/sonic-express/Dockerfile .
      - name: Run deployment script
        run: bash scripts/deploy-production.sh
      - name: Verify deployment
        run: bash scripts/verify-deployment.sh
      - name: Run smoke tests
        run: |
          curl -sSf http://localhost:3000/health
          curl -sSf http://localhost:3000/api/v1/status
      - name: Create deployment artifact
        run: |
          mkdir -p deployment-artifacts
          cp -r build/* deployment-artifacts/
          cp package.json deployment-artifacts/
          cp README.md deployment-artifacts/
      - name: Upload deployment artifact
        uses: actions/upload-artifact@v3
        with:
          name: udos-deployment-${{ github.sha }}
          path: deployment-artifacts/

  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Generate API docs
        run: npx typedoc --out docs/api src/index.ts
      - name: Generate markdown documentation
        run: bash scripts/generate-docs.sh
      - name: Check documentation
        run: npm run docs:check
      - name: Update documentation index
        run: bash scripts/update-docs-index.sh

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [lint, test, safety, documentation]
    if: always()
    steps:
      - name: Send notification
        uses: actions/github-script@v6
        with:
          script: |
            const payload = {
              event: "ci_cd_completion",
              repo: context.repo.repo,
              workflow: "CI/CD Pipeline",
              status: ${{ job.status }},
              timestamp: new Date().toISOString(),
              message: "CI/CD pipeline completed",
              jobs: {
                lint: "${{ needs.lint.result }}",
                test: "${{ needs.test.result }}",
                safety: "${{ needs.safety.result }}",
                documentation: "${{ needs.documentation.result }}"
              }
            };
            
            await fetch('${{ secrets.UDOS_WEBHOOK_URL }}', {
              method: 'POST',
              body: JSON.stringify(payload),
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${{ secrets.UDOS_WEBHOOK_TOKEN }}`
              }
            });
