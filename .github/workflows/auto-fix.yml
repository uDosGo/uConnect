name: Auto-fix test failures

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, dev]

jobs:
  test-and-auto-fix:
    name: Test and Auto-Fix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          npm install
          cd ui && npm install

      - name: Build
        run: npm run build

      - name: Run tests
        id: test
        run: |
          npm test 2>&1 | tee test-output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          if [ $TEST_EXIT_CODE -ne 0 ]; then
            echo "Tests failed"
            echo "auto_fix_attempted=true" >> $GITHUB_OUTPUT
          else
            echo "All tests passed! ✅"
            echo "auto_fix_attempted=false" >> $GITHUB_OUTPUT
          fi
          exit $TEST_EXIT_CODE

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-output.txt
          retention-days: 7
