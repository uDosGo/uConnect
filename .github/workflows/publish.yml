name: uDosGo Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.2.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  pypi:
    name: PyPI
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip build twine

    - name: Build and publish
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        cd uCode1
        python -m build
        twine upload dist/* --skip-existing || echo "Upload skipped (may already exist)"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install docs deps
      run: |
        python -m pip install --upgrade pip
        pip install mkdocs mkdocs-material

    - name: Build documentation site
      run: |
        mkdir -p docs/site
        # Copy README as index
        cp README.md docs/site/index.md 2>/dev/null || echo "No README"
        cp docs/roadmap.md docs/site/roadmap.md 2>/dev/null || echo "No roadmap"
        echo "# uDosGo Documentation" > docs/site/index.html
        echo "<p>Version: ${{ github.event.release.tag_name || github.ref_name }}</p>" >> docs/site/index.html
        echo '<ul><li><a href="roadmap.html">Roadmap</a></li></ul>' >> docs/site/index.html

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: docs/site
        force_orphan: true
