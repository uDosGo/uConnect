name: uDosGo Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.2.0)'
        required: true
        type: string

jobs:
  # ── Pre-flight ─────────────────────────────────────────────────────────────
  preflight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Verify version matches tag
      run: |
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        echo "Tag version: $TAG_VERSION"
        echo "All checks passed ✅"

  # ── Documentation ──────────────────────────────────────────────────────────
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install docs deps
      run: |
        python -m pip install --upgrade pip
        pip install mkdocs mkdocs-material

    - name: Build documentation site
      run: |
        mkdir -p docs/site
        cp README.md docs/site/index.md 2>/dev/null || echo "No README"
        echo "# uDosGo Documentation" > docs/site/index.html
        echo "<p>Version: ${{ github.event.release.tag_name || github.ref_name }}</p>" >> docs/site/index.html

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: docs/site
        force_orphan: true
