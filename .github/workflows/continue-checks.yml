name: Continue Checks

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  continue-checks:
    name: Continue Quality Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: clippy, rustfmt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r uCode1/requirements.txt
          pip install pip-audit

      - name: Install Rust audit tool
        run: cargo install cargo-audit --locked 2>/dev/null || true

      - name: Install Continue CLI
        run: npm install -g @continuedev/cli 2>/dev/null || echo "Continue CLI not available, running checks manually"

      # ── Check: Build Verification ──────────────────────────────────────────
      - name: Check – Build Verification
        run: |
          echo "::group::Python Build"
          cd uCode1 && python -m build --wheel
          echo "::endgroup::"
          echo "::group::Rust Build"
          cd uCode2 && cargo build --workspace --verbose
          echo "::endgroup::"

      # ── Check: Lint & Format ──────────────────────────────────────────────
      - name: Check – Lint & Format
        run: |
          echo "::group::Python Lint"
          cd uCode1 && python -m ruff check --ignore E501,F401 core_py/ narrator/ tests/ --no-cache
          echo "::endgroup::"
          echo "::group::Rust Clippy"
          cd uCode2 && cargo clippy --workspace -- -D warnings || echo "Clippy warnings (non-blocking)"
          echo "::endgroup::"
          echo "::group::Rust Format"
          cd uCode2 && cargo fmt --all -- --check || echo "Format issues (non-blocking)"
          echo "::endgroup::"

      # ── Check: Test Coverage ──────────────────────────────────────────────
      - name: Check – Python Tests
        run: |
          cd uCode1 && python -m pytest tests/ -v --tb=short --cov=core_py --cov=narrator --cov-report=term-missing

      - name: Check – Rust Tests
        run: |
          cd uCode2 && cargo test --workspace --verbose

      # ── Check: Security Scan ──────────────────────────────────────────────
      - name: Check – Python Security Audit
        run: |
          cd uCode1 && pip-audit --requirement requirements.txt || echo "Vulnerabilities found (non-blocking)"
        continue-on-error: true

      - name: Check – Rust Security Audit
        run: |
          cd uCode2 && cargo audit || echo "Vulnerabilities found (non-blocking)"
        continue-on-error: true

      # ── Upload Results ────────────────────────────────────────────────────
      - name: Upload Continue Results
        uses: actions/upload-artifact@v4
        with:
          name: continue-results
          path: |
            .continue/results/
            uCode1/test-results/
          if-no-files-found: ignore
