name: Core CI

on:
  pull_request:
    paths:
      - "package.json"
      - "src/**"
      - "binder/**"
      - "scripts/**"
      - ".github/workflows/core-ci.yml"
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "src/**"
      - "binder/**"
      - "scripts/**"
      - ".github/workflows/core-ci.yml"

jobs:
  workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install workspace and test
        run: npm install && npm test
