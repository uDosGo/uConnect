name: uDosGo CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Courses Validation ─────────────────────────────────────────────────────
  courses:
    name: Validate Courses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate course shells
        run: bash scripts/validate-courses.sh
