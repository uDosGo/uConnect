name: uDosGo CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Binder (Python) ────────────────────────────────────────────────────────
  binder:
    name: Binder (Python)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov

    - name: Run tests
      run: |
        cd binder && python -m pytest tests/ -v --tb=short

  # ── Node.js Lint ───────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
      - run: npm run lint:check

  # ── Courses Validation ─────────────────────────────────────────────────────
  courses:
    name: Validate Courses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate course shells
        run: bash scripts/validate-courses.sh
