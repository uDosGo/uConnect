name: uDosGo CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Python Core (uCode1) ──────────────────────────────────────────────────
  python:
    name: Python (uCode1)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r uCode1/requirements.txt

    - name: Lint with ruff
      run: |
        cd uCode1 && python -m ruff check --ignore E501,F401 core_py/ narrator/ tests/ --no-cache || echo "(non-blocking)"

    - name: Run tests with pytest
      run: |
        cd uCode1 && python -m pytest tests/ -v --tb=short --cov=core_py --cov=narrator

    - name: Verify CLI works
      run: |
        cd uCode1 && python ucode --version
        python ucode --help | head -5

  # ── Rust Workspace (uCode2) ───────────────────────────────────────────────
  rust:
    name: Rust (uCode2)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        override: true
        components: clippy, rustfmt

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          **/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build uCode2 workspace
      run: cd uCode2 && cargo build --workspace --verbose

    - name: Run Rust tests
      run: cd uCode2 && cargo test --workspace --verbose

    - name: Check formatting
      run: cd uCode2 && cargo fmt --all -- --check
      continue-on-error: true

    - name: Clippy
      run: cd uCode2 && cargo clippy --workspace -- -D warnings
      continue-on-error: true

  # ── ThinUI (React) ────────────────────────────────────────────────────────
  thinui:
    name: ThinUI Shell
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: uCode2/ThinUI/package-lock.json

    - name: Install dependencies
      run: cd uCode2/ThinUI && npm ci

    - name: Build ThinUI
      run: cd uCode2/ThinUI && npm run build
      continue-on-error: true

  # ── Node.js Lint (from dev branch) ────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run lint

  # ── Release (on tags) ────────────────────────────────────────────────────-
  release:
    name: Create Release
    needs: [python, rust]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Build Python wheel
      run: |
        python -m pip install --upgrade pip build
        cd uCode1 && python -m build --wheel
        echo "Wheel: $(ls dist/*.whl)"

    - name: Build Rust release
      run: |
        cd uCode2 && cargo build --release --workspace
        mkdir -p ../release
        cp target/release/mcp-server ../release/
        cp target/release/ucode2-cli ../release/
        echo "Binaries built"

    - name: Package assets
      run: |
        tar -czvf ucode1-core-${{ github.ref_name }}.tar.gz -C uCode1/dist .
        tar -czvf ucode2-bin-${{ github.ref_name }}.tar.gz -C release .
        echo "ASSET1=ucode1-core-${{ github.ref_name }}.tar.gz" >> $GITHUB_ENV
        echo "ASSET2=ucode2-bin-${{ github.ref_name }}.tar.gz" >> $GITHUB_ENV

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ucode1-core-${{ github.ref_name }}.tar.gz
          ucode2-bin-${{ github.ref_name }}.tar.gz
        generate_release_notes: true
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}