# Safety Rules
rules:
  - id: "no-direct-writes"
    description: "No direct file writes without review"
    severity: high
    enabled: true
  
  - id: "test-coverage"
    description: "Minimum 80% test coverage required"
    severity: medium
    enabled: true
  
  - id: "git-commit-message"
    description: "Commit messages must follow conventional commits"
    severity: medium
    enabled: true
  
  - id: "branch-protection"
    description: "Main branch requires PR approval"
    severity: high
    enabled: true