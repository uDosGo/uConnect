# Review Flow
name: review
steps:
  - name: "Code Analysis"
    agent: "reviewer"
    actions:
      - "Check code quality"
      - "Verify style guide"
      - "Check for anti-patterns"
  
  - name: "Security Scan"
    agent: "reviewer"
    actions:
      - "Check for vulnerabilities"
      - "Review dependencies"
      - "Check permissions"
  
  - name: "Performance Check"
    agent: "reviewer"
    actions:
      - "Analyze complexity"
      - "Check for bottlenecks"
      - "Review memory usage"
  
  - name: "Documentation Review"
    agent: "reviewer"
    actions:
      - "Check API documentation"
      - "Review user docs"
      - "Verify examples"