# Release Flow
name: release
steps:
  - name: "Pre-release Check"
    agent: "reviewer"
    actions:
      - "Verify all tests pass"
      - "Check version bump"
      - "Review changelog"
  
  - name: "Build"
    agent: "codegen"
    actions:
      - "Run build script"
      - "Create artifacts"
      - "Sign packages"
  
  - name: "Test Release"
    agent: "tester"
    actions:
      - "Test installation"
      - "Verify functionality"
      - "Check upgrade path"
  
  - name: "Publish"
    agent: "reviewer"
    actions:
      - "Upload to repository"
      - "Update documentation"
      - "Announce release"
  
  - name: "Post-release"
    agent: "reviewer"
    actions:
      - "Monitor for issues"
      - "Gather feedback"
      - "Plan next version"