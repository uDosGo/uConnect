# Development Cycle Flow
name: dev-cycle
steps:
  - name: "Plan"
    agent: "reviewer"
    actions:
      - "Review backlog"
      - "Prioritize tasks"
      - "Assign to agents"
  
  - name: "Develop"
    agent: "codegen"
    actions:
      - "Generate code"
      - "Write tests"
      - "Document changes"
  
  - name: "Test"
    agent: "tester"
    actions:
      - "Run tests"
      - "Analyze coverage"
      - "Fix issues"
  
  - name: "Review"
    agent: "reviewer"
    actions:
      - "Code review"
      - "Security check"
      - "Performance check"
  
  - name: "Merge"
    agent: "reviewer"
    actions:
      - "Merge to main"
      - "Update documentation"
      - "Close issues"