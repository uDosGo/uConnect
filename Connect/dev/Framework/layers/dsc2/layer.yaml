# layers/dsc2/layer.yaml
name: dsc2
version: 0.1.0
description: DeepSeek Reasoning Engine integration
author: Sonic Family

dependencies:
  - name: base-node
    min_version: 2.0.0

files:
  - source: dsc2-server/
    target: ../dsc2-server/
    template: false
  - source: scripts/dsc2-start.sh
    target: scripts/dsc2-start.sh
    executable: true

scripts:
  post_install: |
    cd ../dsc2-server
    npm install
    npm run pm2:start

commands:
  - name: dsc2:start
    command: "cd ../dsc2-server && npm run pm2:start"
  - name: dsc2:stop
    command: "cd ../dsc2-server && npm run pm2:stop"
  - name: dsc2:logs
    command: "cd ../dsc2-server && npm run pm2:logs"
  - name: dsc2:test
    command: "cd ../dsc2-server && npm test"