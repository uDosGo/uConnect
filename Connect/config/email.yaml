# Email Notifications Configuration
# This file configures SMTP settings and email templates for uDos

smtp:
  # SMTP server configuration
  host: "localhost"
  port: 25
  # Uncomment and configure for authenticated SMTP
  # user: "your_username"
  # password: "your_password"
  # encryption: "tls"  # tls, ssl, or null for none
  
  # Sender information
  from:
    name: "uDos Notifications"
    email: "noreply@udos.local"
  
  # Connection pooling
  pool:
    enabled: true
    max_connections: 5
    idle_timeout: 30  # seconds

# Email queue settings
queue:
  # Retry schedule (in seconds)
  retry_schedule: [60, 300, 1800, 7200, 21600]  # 1m, 5m, 30m, 2h, 6h
  max_attempts: 5
  dead_letter_queue: true
  
  # Processing settings
  batch_size: 10
  worker_interval: 5  # seconds between queue checks

# Email templates
# Templates are stored in templates/email/
# Available variables depend on event type
templates:
  # Template engine configuration
  engine: "handlebars"  # or "ejs", "mustache"
  
  # Default layout (optional)
  # layout: "default.html"

# Event-specific settings
events:
  conflict_detected:
    enabled: true
    priority: "high"
    template: "conflict_detected.html"
    
  webhook_failed:
    enabled: true
    priority: "high"
    template: "webhook_failed.html"
    
  user_role_changed:
    enabled: true
    priority: "medium"
    template: "user_role_changed.html"
    
  daily_summary:
    enabled: true
    priority: "low"
    template: "daily_summary.html"
    # Send at 8 AM server time
    schedule: "0 8 * * *"
    
  system_error:
    enabled: true
    priority: "high"
    template: "system_error.html"

# Rate limiting (emails per time window)
rate_limits:
  per_minute: 60
  per_hour: 500
  per_day: 5000

# Logging
logging:
  level: "info"  # debug, info, warn, error
  file: "logs/email_notifications.log"
  max_size: "10MB"
  max_files: 5