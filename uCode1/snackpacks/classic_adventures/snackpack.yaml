# Classic Adventures SnackPack
# A collection of classic text adventures for uCode1

name: classic_adventures
version: "1.0.0"
description: "Classic text adventures — NetHack and Eamon with teletext rendering"
author: "uCode1 Team"

snacks:
  - name: nethack
    version: "1.0.0"
    source: snacks/nethack
    description: "NetHack — Dungeons & Dragons-style roguelike"
    default: true
    
  - name: eamon
    version: "1.0.0"
    source: snacks/eamon
    description: "Eamon — Classic text adventure system"

shared:
  lens:
    common_variables:
      - name: HP%
        description: "Hit points (shared across games)"
      - name: GOLD%
        description: "Gold pieces (shared across games)"
      - name: ROOM%
        description: "Current room/level (shared across games)"
  
  skin:
    default: teletext_classic
    fallback: paper_retro

launcher:
  title: "Classic Adventures"
  subtitle: "Select a game to play"
  prompt: "Enter choice (1-2): "
  menu:
    - key: "1"
      snack: nethack
      label: "NetHack"
      description: "Explore the dungeons below"
    - key: "2"
      snack: eamon
      label: "Eamon"
      description: "Classic text adventures"
