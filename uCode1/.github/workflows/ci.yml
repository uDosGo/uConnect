name: uCode1 CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.py'
      - '**.yaml'
      - '**.yml'
      - 'requirements.txt'
      - 'setup.py'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release-ucode1.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.py'
      - '**.yaml'
      - '**.yml'
      - 'requirements.txt'
      - 'setup.py'

env:
  PYTHON_VERSION: '3.11'
  PYTHONUNBUFFERED: 1

jobs:
  # ── Lint & Format ──────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort

      - name: Check formatting with Black
        run: |
          black --check --diff --line-length=100 \
            core_py/ tests/ ucode1/ narrator/ ok_agent/ \
            *.py 2>/dev/null || echo "Black formatting issues found (non-blocking)"

      - name: Check import ordering with isort
        run: |
          isort --check-only --diff --profile black \
            core_py/ tests/ ucode1/ narrator/ ok_agent/ \
            *.py 2>/dev/null || echo "isort issues found (non-blocking)"

      - name: Lint with flake8
        run: |
          flake8 \
            --max-line-length=100 \
            --extend-ignore=E203,E266,E501,W503 \
            --exclude=__pycache__,.venv,dist,build \
            core_py/ tests/ ucode1/ narrator/ ok_agent/ \
            *.py 2>/dev/null || echo "flake8 issues found (non-blocking)"

  # ── Unit Tests (Python) ────────────────────────────────────────────────
  test-python:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --cov=core_py \
            --cov=ucode1 \
            --cov=narrator \
            --cov=ok_agent \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: ucode1-coverage
          fail_ci_if_error: false

  # ── Import Sanity Check ────────────────────────────────────────────────
  import-check:
    name: Import Sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify all core modules import cleanly
        run: python scripts/ci_check_imports.py

  # ── Snack YAML Validation ──────────────────────────────────────────────
  validate-snacks:
    name: Validate Snack Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Find and validate all snack.yaml files
        run: python scripts/ci_validate_snacks.py

      - name: Find and validate all snackpack.yaml files
        run: python scripts/ci_validate_snackpacks.py

  # ── Security Scan ──────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        run: |
          bandit -r core_py/ ucode1/ narrator/ ok_agent/ \
            --skip B101,B311,B404,B603 \
            --exit-zero \
            -f custom

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for potential secrets in staged files..."
          matches=$(grep -rn --include='*.py' \
            -E '(password|secret|token|api_key|apikey)\s*=\s*["'"'"'][^"'"'"']+' \
            core_py/ ucode1/ narrator/ ok_agent/ 2>/dev/null \
            | grep -v 'test_' | grep -v 'example' || true)
          if [ -n "$matches" ]; then
            echo "Potential secrets found (review manually):"
            echo "$matches"
          else
            echo "No obvious secrets detected"
          fi

  # ── Build & Package ────────────────────────────────────────────────────
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, test-python, import-check, validate-snacks]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: pip install build wheel

      - name: Build wheel and source distribution
        run: python -m build --sdist --wheel

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ucode1-dist
          path: dist/
          retention-days: 7

  # ── Release (triggered by tag) ─────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/ucode1-')
    needs: [lint, test-python, import-check, validate-snacks, security]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: pip install build wheel

      - name: Build wheel and source distribution
        run: python -m build --sdist --wheel

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          name: uCode1 ${{ github.ref_name }}
          body: |
            ## uCode1 ${{ github.ref_name }}

            See the changelog for details.

            ### Installation
            ```bash
            pip install ucode1==${{ github.ref_name }}
            ```

            ### What's Changed
            See the release notes below for a summary of changes.
