# Eamon Snack Manifest
# uCode1 Snack Container for Eamon adventures with teletext rendering

name: eamon
version: "1.0.0"
description: "Eamon — Classic text adventure system with teletext rendering"
author: "uCode1 Team"
lane: ucode1

entrypoint:
  type: bbc
  path: scripts/boot.bbc

emulator:
  type: apple2
  backend: teletext
  disks:
    master: disks/eamon_master.dsk
    adventure: disks/adventure.dsk
  args:
    - -apple2
    - -rom
    - -nohalt

lens:
  enabled: true
  auto_capture:
    interval: 0.5
    type: time
    events:
      - hp_change
      - gold_change
      - room_change
      - combat
      - item_get
      - item_drop
      - weapon_change
      - armor_change
  variables:
    - name: HP%
      address: "0x0200"
      type: int
      description: "Current hit points"
    - name: MAXHP%
      address: "0x0202"
      type: int
      description: "Maximum hit points"
    - name: GOLD%
      address: "0x0204"
      type: int
      description: "Gold pieces"
    - name: STR%
      address: "0x0206"
      type: int
      description: "Strength"
    - name: INT%
      address: "0x0208"
      type: int
      description: "Intelligence"
    - name: DEX%
      address: "0x020A"
      type: int
      description: "Dexterity"
    - name: AGI%
      address: "0x020C"
      type: int
      description: "Agility"
    - name: ROOM%
      address: "0x020E"
      type: int
      description: "Current room number"
    - name: WEAPON%
      address: "0x0210"
      type: int
      description: "Current weapon index"
    - name: ARMOR%
      address: "0x0212"
      type: int
      description: "Current armor index"
    - name: WEAPON$
      address: "0x0300"
      type: string
      length: 20
      description: "Current weapon name"
    - name: ARMOR$
      address: "0x0320"
      type: string
      length: 20
      description: "Current armor name"
    - name: ROOM$
      address: "0x0400"
      type: string
      length: 40
      description: "Current room description"
    - name: STATUS$
      address: "0x0500"
      type: string
      length: 40
      description: "Full status line"

skin:
  default: paper_retro
  styles:
    paper_retro:
      foreground: "#FFFFFF"
      background: "#1a1a2e"
      font: "Courier New"
      border: "#e94560"
      header: "#0f3460"
      highlight: "#e94560"
    green_monitor:
      foreground: "#00FF00"
      background: "#001100"
      font: "Courier New"
      border: "#00FF00"
      header: "#00CC00"
      highlight: "#FFFF00"

mcp:
  commands:
    - name: PAUSE
      description: "Pause adventure"
    - name: RESUME
      description: "Resume adventure"
    - name: SAVE
      description: "Save adventure state"
    - name: RESTORE
      description: "Restore adventure state"
    - name: STATUS
      description: "Get current adventure status"
    - name: DISK
      description: "Swap adventure disk"
    - name: QUIT
      description: "Quit adventure"

spool:
  format: json
  compression: none
  auto_save:
    enabled: true
    interval: 30
    events:
      - room_change
      - combat
      - save_game

dependencies: []
