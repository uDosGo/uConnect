<!doctype html>
<html>
<head>
  <title>uDos Grid Size Tests</title>
  <link href="display.css?v=20260430" rel="stylesheet">
  <script src="udos-widgets.js?v=20260430"></script>
  <style>
    body { background: #1a1a2e; color: #c0c0d0; font: 13px system-ui, sans-serif; padding: 20px; }
    h1 { color: #e94560; font-size: 18px; margin: 0 0 20px; }
    .grid-row { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
    .grid-card {
      background: #16213e; border: 1px solid #0f3460; border-radius: 6px;
      padding: 12px; min-width: 200px;
    }
    .grid-card h2 { color: #e94560; font-size: 13px; margin: 0 0 8px; }
    .grid-card .label { font-size: 10px; color: #606080; margin-bottom: 4px; }
    .mini-grid {
      font-family: "C64 User Mono", monospace; font-size: 12px; line-height: 1;
      color: #b0c8ff; white-space: pre; overflow: hidden;
    }
    .stats { font-size: 10px; color: #506080; margin-top: 6px; }
  </style>
</head>
<body>
<h1>uDos Grid Size Matrix (9 sizes · 24px base font)</h1>
<div class="grid-row">
  <div class="grid-card"><h2>20x10 TINY</h2><div class="label">480x240px · 200 cells</div><pre class="mini-grid" id="g20x10"></pre></div>
  <div class="grid-card"><h2>32x16 NANO</h2><div class="label">768x384px · 512 cells</div><pre class="mini-grid" id="g32x16"></pre></div>
  <div class="grid-card"><h2>40x24 COMPACT</h2><div class="label">960x576px · 960 cells</div><pre class="mini-grid" id="g40x24"></pre></div>
  <div class="grid-card"><h2>80x30 CLASSIC</h2><div class="label">1920x720px · 2400 cells</div><pre class="mini-grid" id="g80x30"></pre></div>
  <div class="grid-card"><h2>48x48 SQUARE</h2><div class="label">1152x1152px · 2304 cells</div><pre class="mini-grid" id="g48x48"></pre></div>
</div>
<script>
  function drawGrid(id, cols, rows) {
    var el = document.getElementById(id);
    if (!el) return;
    var out = [];
    // Top border
    out.push('\xB3' + Array(cols).join('\xDF') + '\xB3');
    // Rows with row numbers
    for (var r = 0; r < rows - 2; r++) {
      var line = '\xB3';
      for (var c = 0; c < cols; c++) {
        if (c === 0 || c === cols - 1) line += '\xB3';
        else if (c === Math.floor(cols / 4) && r === Math.floor((rows - 2) / 2)) line += 'uDos';
        else line += String.fromCharCode(176 + (r + c) % 3);
      }
      line += '\xB3';
      out.push(line.substring(0, cols));
    }
    // Bottom border
    out.push('\xB3' + Array(cols).join('\xDC') + '\xB3');
    el.textContent = out.join('\n');
    // Stats
    var stats = document.createElement('div');
    stats.className = 'stats';
    stats.textContent = 'pixels: '+(cols*24)+'x'+(rows*24)+' · 24px base font';
    el.parentNode.appendChild(stats);
  }
  drawGrid('g20x10', 20, 10);
  drawGrid('g32x16', 32, 16);
  drawGrid('g40x24', 40, 24);
  drawGrid('g80x30', 80, 30);
  drawGrid('g48x48', 48, 48);
</script>
</body>
</html>
