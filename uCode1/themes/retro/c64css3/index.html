<!doctype html>
<html>
<head>
    <title>uCode1 BBC BASIC Interpreter - C64 Theme</title>
    <link href="css.css" rel="stylesheet">
    <script src="prefixfree.min.js"></script>
    <style>
        /* BBC Basic specific styles */
        body {
            background: #222;
            font-family: "C64 User Mono", monospace;
        }
        
        .bbc-container {
            position: absolute;
            width: 600px;
            height: 360px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a2e;
            border: 16px solid #000;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            padding: 15px;
            box-sizing: border-box;
            color: #0ff;
            overflow: hidden;
        }
        
        .bbc-header {
            background: #000;
            padding: 10px;
            margin: -15px -15px 15px -15px;
            border-bottom: 2px solid #0ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .bbc-title {
            font-family: "C64 User Mono", monospace;
            font-size: 18px;
            color: #fff;
            margin: 0;
        }
        
        .bbc-toolbar {
            display: flex;
            gap: 8px;
            margin: 5px 0;
        }
        
        .bbc-btn {
            background: #444;
            color: #0ff;
            border: 1px solid #0ff;
            padding: 6px 12px;
            font-family: "C64 User Mono", monospace;
            font-size: 12px;
            cursor: pointer;
            outline: none;
            text-transform: uppercase;
        }
        
        .bbc-btn:hover {
            background: #0ff;
            color: #000;
        }
        
        .bbc-btn:active {
            background: #088;
            border-color: #0ff;
        }
        
        .bbc-btn.primary {
            background: #0ff;
            color: #000;
        }
        
        .bbc-btn.danger {
            background: #f00;
            color: #fff;
            border-color: #f88;
        }
        
        .bbc-screen {
            background: #000;
            border: 2px solid #0ff;
            height: 200px;
            padding: 10px;
            font-family: "C64 User Mono", monospace;
            font-size: 14px;
            line-height: 1.4;
            color: #0ff;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-bottom: 10px;
        }
        
        .bbc-screen::selection {
            background: #0ff;
            color: #000;
        }
        
        .bbc-input {
            background: #111;
            color: #0ff;
            border: 1px solid #0ff;
            padding: 8px;
            font-family: "C64 User Mono", monospace;
            font-size: 14px;
            width: 100%;
            outline: none;
            box-sizing: border-box;
        }
        
        .bbc-input:focus {
            border-color: #0ff;
            background: #222;
        }
        
        .bbc-input-prompt {
            color: #0ff;
            font-family: "C64 User Mono", monospace;
            margin-right: 8px;
        }
        
        .bbc-status {
            display: flex;
            justify-content: space-between;
            font-family: "C64 User Mono", monospace;
            font-size: 12px;
            color: #088;
            padding: 5px 10px;
            background: #111;
            border-top: 1px solid #0ff;
            margin-top: 10px;
        }
        
        .bbc-code {
            background: #111;
            border: 1px solid #0ff;
            padding: 10px;
            font-family: "C64 User Mono", monospace;
            font-size: 13px;
            height: 120px;
            overflow-y: auto;
            white-space: pre;
            tab-size: 4;
            margin-bottom: 10px;
        }
        
        .bbc-outline {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        @media (max-width: 700px) {
            .bbc-container {
                width: 95%;
                height: 90%;
            }
            .bbc-outline {
                grid-template-columns: 1fr;
            }
        }
        
        /* Blinking cursor */
        .cursor::after {
            content: "\_ ";
            animation: blink 0.8s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        /* BBC color scheme */
        .color-black { color: #000; }
        .color-white { color: #fff; }
        .color-red { color: #800000; }
        .color-green { color: #008000; }
        .color-yellow { color: #808000; }
        .color-blue { color: #000080; }
        .color-magenta { color: #800080; }
        .color-cyan { color: #008080; }
        .color-bright { color: #ff0000; }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #444;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #0ff;
        }
    </style>
</head>
<body>
    
    <div class="bbc-container">
        <div class="bbc-header">
            <div class="bbc-title">
                <span style="color: #f00;">BBC</span> <span style="color: #0ff;">BASIC</span>
            </div>
            <span style="color: #088; font-size: 12px;">uCode1 Interpreter</span>
        </div>
        
        <div class="bbc-outline">
            <div>
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <button class="bbc-btn primary" id="run-btn" onclick="runProgram()">RUN</button>
                    <button class="bbc-btn" id="list-btn" onclick="listProgram()">LIST</button>
                    <button class="bbc-btn" id="new-btn" onclick="newProgram()">NEW</button>
                    <button class="bbc-btn" id="load-btn" onclick="loadProgram()">LOAD</button>
                    <button class="bbc-btn" id="save-btn" onclick="saveProgram()">SAVE</button>
                </div>
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <button class="bbc-btn" onclick="clearScreen()">CLS</button>
                    <button class="bbc-btn" onclick="toggleMode()">MODE</button>
                    <button class="bbc-btn" onclick="showHelp()">HELP</button>
                    <button class="bbc-btn danger" id="stop-btn" onclick="stopProgram()" disabled>STOP</button>
                </div>
                
                <div style="height: 180px; overflow-y: auto; margin-bottom: 10px;">
                    <textarea class="bbc-code" id="code-editor" spellcheck="false" 
                              placeholder="Enter BBC BASIC program here...">
10 REM BBC BASIC
20 PRINT "HELLO WORLD"
30 PRINT "PRESS RUN TO EXECUTE"
40 VDU 18,7,0
50 VDU 17,1
60 PRINT "RED TEXT"
70 VDU 17,7
80 PRINT "WHITE TEXT"
90 END
                    </textarea>
                </div>
                
                <div style="display: flex; gap: 5px;">
                    <input type="text" class="bbc-input" id="direct-input" 
                           placeholder="Direct commands..." 
                           onkeydown="handleDirectInput(event)" autocomplete="off" spellcheck="false">
                </div>
            </div>
            
            <div>
                <div style="height: 220px; overflow-y: auto;">
                    <div class="bbc-screen" id="bbc-output">
BBC BASIC V (uCode1)
(C) 1981 ACO

<code class="cursor"></code>
                    </div>
                </div>
                
                <div style="margin-top: 10px;">
                    <select id="mode-select" onchange="setMode(this.value)" class="bbc-btn">
                        <option value="7" selected>Mode 7 (Teletext)</option>
                        <option value="0">Mode 0 (640x560)</option>
                        <option value="1">Mode 1 (320x256)</option>
                        <option value="2">Mode 2 (640x512)</option>
                        <option value="3">Mode 3 (Text)</option>
                        <option value="4">Mode 4 (320x256, 16c)</option>
                        <option value="5">Mode 5 (640x512)</option>
                        <option value="6">Mode 6 (Teletext 40x25)</option>
                    </select>
                    
                    <select id="fg-color" onchange="setFGColor(this.value)">
                        <option value="0">0 Black</option>
                        <option value="1">1 Red</option>
                        <option value="2">2 Green</option>
                        <option value="3">3 Yellow</option>
                        <option value="4">4 Blue</option>
                        <option value="5">5 Magenta</option>
                        <option value="6">6 Cyan</option>
                        <option value="7" selected>7 White</option>
                    </select>
                    
                    <select id="bg-color" onchange="setBGColor(this.value)">
                        <option value="0" selected>0 Black</option>
                        <option value="1">1 Red</option>
                        <option value="2">2 Green</option>
                        <option value="3">3 Yellow</option>
                        <option value="4">4 Blue</option>
                        <option value="5">5 Magenta</option>
                        <option value="6">6 Cyan</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="bbc-status">
            <span><span id="status-indicator" style="display: inline-block; width: 10px; height: 10px; background: #0f0; border-radius: 50%; margin-right: 5px;"></span><span id="status-text">READY</span></span>
            <span id="line-count">Lines: 0</span>
            <span id="mode-display">Mode: 7</span>
            <span id="clock">00:00:00</span>
        </div>
    </div>
    
    <a href="https://pixelambacht.nl/2013/css3-c64/" class="credits" style="color: #000; text-shadow: none;">C64 CSS by Pixelambacht | BBC BASIC on uCode1</a>

    <script>
        // BBC BASIC Interpreter UI - C64 Theme
        // Integrated with uCode1 BBC BASIC backend

        const state = {
            programLines: [],
            running: false,
            currentLine: 0,
            variables: {},
            screenMode: 7,
            fgColor: 7,
            bgColor: 0,
            outputDiv: null,
            codeEditor: null,
            directInput: null
        };

        // BBC BASIC keywords for syntax highlighting
        const bbcKeywords = [
            'END', 'PRINT', 'INPUT', 'LET', 'DIM', 'FOR', 'TO', 'NEXT', 'STEP',
            'IF', 'THEN', 'ELSE', 'ENDIF', 'CASE', 'OF', 'OTHERWISE', 'ENDCASE',
            'REPEAT', 'UNTIL', 'WHILE', 'ENDWHILE', 'GOTO', 'GOSUB', 'RETURN',
            'PROC', 'ENDPROC', 'DEF', 'FN', 'LOCAL', 'ON', 'ERROR', 'RESUME',
            'MODE', 'VDU', 'CLS', 'CLG', 'PLOT', 'DRAW', 'COLOUR', 'GCOL',
            'MOVE', 'ORIGIN', 'WINDOW', 'SCROLL', 'SOUND', 'ENVELOPE',
            'BPUT', 'BGET', 'OPENIN', 'OPENOUT', 'OPENUP', 'CLOSE', 'PTR', 'EXT',
            'RUN', 'NEW', 'LIST', 'LOAD', 'SAVE', 'CHAIN', 'QUIT'
        ];

        // Initialize
        function init() {
            state.outputDiv = document.getElementById('bbc-output');
            state.codeEditor = document.getElementById('code-editor');
            state.directInput = document.getElementById('direct-input');
            
            // Load initial program
            loadProgramFromEditor();
            
            // Start clock
            startClock();
            
            // Focus on direct input
            state.directInput.focus();
            
            // Update line count
            updateLineCount();
            
            // Log ready
            printToOutput('\nBBC BASIC V (uCode1)\n');
            printToOutput('Type HELP for commands\n');
            updatePrompt();
        }

        function printToOutput(text) {
            if (!state.outputDiv) return;
            
            const wasAtBottom = state.outputDiv.scrollTop + state.outputDiv.clientHeight >= state.outputDiv.scrollHeight - 5;
            
            state.outputDiv.innerHTML = state.outputDiv.innerHTML.replace(/<code class="cursor"><\/code>/, '');
            state.outputDiv.innerHTML += text.replace(/\n/g, '<br>');
            
            updatePrompt();
            
            if (wasAtBottom) {
                state.outputDiv.scrollTop = state.outputDiv.scrollHeight;
            }
        }

        function updatePrompt() {
            if (!state.outputDiv) return;
            if (!state.outputDiv.innerHTML.endsWith('<code class="cursor"></code>')) {
                state.outputDiv.innerHTML += '<code class="cursor"></code>';
            }
        }

        function clearScreen() {
            state.outputDiv.innerHTML = '<code class="cursor"></code>';
            state.directInput.value = '';
            updatePrompt();
        }

        function newProgram() {
            state.codeEditor.value = '';
            state.programLines = [];
            clearScreen();
            updateLineCount();
            printToOutput('New program\n');
        }

        function loadProgramFromEditor() {
            const text = state.codeEditor.value;
            state.programLines = [];
            const lines = text.split('\n');
            for (const line of lines) {
                const trimmed = line.trim();
                if (trimmed) {
                    state.programLines.push(trimmed);
                }
            }
            updateLineCount();
        }

        function updateLineCount() {
            const count = state.programLines.length;
            document.getElementById('line-count').textContent = `Lines: ${count}`;
        }

        function listProgram() {
            if (state.programLines.length === 0) {
                printToOutput('No program\n');
                return;
            }
            printToOutput('\n--- PROGRAM LISTING ---\n');
            for (const line of state.programLines) {
                printToOutput(`${line}\n`);
            }
            printToOutput('--- END ---\n');
            updatePrompt();
        }

        function runProgram() {
            if (state.running) {
                printToOutput('\nAlready running\n');
                return;
            }
            
            if (state.programLines.length === 0) {
                printToOutput('\nNo program to run\n');
                return;
            }
            
            state.running = true;
            document.getElementById('run-btn').disabled = true;
            document.getElementById('stop-btn').disabled = false;
            document.getElementById('status-text').textContent = 'RUNNING';
            document.getElementById('status-indicator').style.background = '#ff0';
            
            // Simulate execution
            simulateProgramExecution();
        }

        function simulateProgramExecution() {
            const delay = 50; // ms between statements
            let lineIndex = 0;
            
            function runNext() {
                if (!state.running || lineIndex >= state.programLines.length) {
                    stopProgram();
                    return;
                }
                
                const line = state.programLines[lineIndex];
                printToOutput(`> ${line}\n`);
                
                // Process the line
                processLine(line);
                
                lineIndex++;
                setTimeout(runNext, delay);
            }
            
            runNext();
        }

        function processLine(line) {
            // In a real integration, this would call the actual BBC BASIC interpreter
            // For now, simulate common commands
            
            const upperLine = line.toUpperCase();
            
            if (upperLine.includes('REM')) {
                // Comment - do nothing
            } else if (upperLine.startsWith('PRINT')) {
                const text = line.slice(5).trim();
                if (text) {
                    // Handle PRINT with string
                    if (text.startsWith('"') && text.endsWith('"')) {
                        printToOutput(text.slice(1, -1));
                    } else if (text.startsWith("'") && text.endsWith("'")) {
                        printToOutput(text.slice(1, -1));
                    } else {
                        printToOutput(evaluateExpression(text));
                    }
                }
                printToOutput('\n');
            } else if (upperLine.startsWith('VDU')) {
                // Handle VDU command
                const parts = upperLine.split(/[\s,]+/);
                const cmd = parseInt(parts[1]);
                const args = parts.slice(2).map(p => parseInt(p));
                handleVDU(cmd, args);
            } else if (upperLine.includes('=')) {
                // Assignment
                const eqIndex = line.indexOf('=');
                const varName = line.substring(0, eqIndex).trim();
                const expr = line.substring(eqIndex + 1).trim();
                state.variables[varName] = evaluateExpression(expr);
            } else if (upperLine.includes('CLS') || upperLine.includes('CLG')) {
                clearScreen();
            } else if (upperLine.includes('END')) {
                stopProgram();
            } else if (upperLine.includes('MODE')) {
                const mode = parseInt(line.match(/\d+/)?.[0] || '7');
                setMode(mode);
            } else {
                printToOutput(`[Executed: ${line}]\n`);
            }
        }

        function evaluateExpression(text) {
            // Very simple expression evaluation
            // Replace variables with their values
            for (const [varName, value] of Object.entries(state.variables)) {
                text = text.replace(new RegExp(`\\b${varName}\\b`, 'g'), value);
            }
            
            // Try to evaluate as numeric
            try {
                // Handle basic arithmetic
                text = text.replace(/\s+/g, ' ');
                
                // Simple case: just a number or variable
                if (/^[\d\.]+$/.test(text)) {
                    return parseFloat(text);
                }
                
                // Try to evaluate
                // This is a placeholder - real implementation would use a proper parser
                return eval(text);
            } catch (e) {
                return text;
            }
        }

        function handleVDU(cmd, args) {
            // Handle VDU commands
            if (cmd === 17 && args.length >= 1) {
                // Text color
                state.fgColor = args[0] & 7;
                printToOutput(`[VDU 17,${args[0]}: Text color ${state.fgColor}]\n`);
            } else if (cmd === 18 && args.length >= 1) {
                // Text and background color
                state.fgColor = args[0] & 7;
                state.bgColor = args.length >= 2 ? args[1] & 7 : 0;
                printToOutput(`[VDU 18,${args[0]},${args[1] || 0}: Colors set]\n`);
            } else if (cmd === 22 && args.length >= 1) {
                // Mode
                setMode(args[0]);
            } else if (cmd >= 32 && cmd <= 126) {
                // Printable character
                printToOutput(String.fromCharCode(cmd));
            } else {
                printToOutput(`[VDU ${cmd}: Unknown]\n`);
            }
        }

        function stopProgram() {
            state.running = false;
            document.getElementById('run-btn').disabled = false;
            document.getElementById('stop-btn').disabled = true;
            document.getElementById('status-text').textContent = 'READY';
            document.getElementById('status-indicator').style.background = '#0f0';
            printToOutput('\nProgram stopped\n');
        }

        function setMode(mode) {
            state.screenMode = mode;
            document.getElementById('mode-select').value = mode;
            document.getElementById('mode-display').textContent = `Mode: ${mode}`;
            printToOutput(`\nMode set to ${mode}\n`);
        }

        function setFGColor(color) {
            state.fgColor = parseInt(color);
            printToOutput(`\nFG color set to ${state.fgColor}\n`);
        }

        function setBGColor(color) {
            state.bgColor = parseInt(color);
            printToOutput(`\nBG color set to ${state.bgColor}\n`);
        }

        function toggleMode() {
            const current = state.screenMode;
            const next = (current + 1) % 8;
            setMode(next);
        }

        function loadProgram() {
            // Would load from file
            printToOutput('\nLoad program (not implemented)\n');
        }

        function saveProgram() {
            // Would save to file
            printToOutput('\nSave program (not implemented)\n');
        }

        function showHelp() {
            printToOutput('\n--- BBC BASIC Help ---\n');
            printToOutput('Commands: RUN, LIST, NEW, LOAD, SAVE, CLS\n');
            printToOutput('VDU commands: VDU 17,c (color), VDU 22,n (mode)\n');
            printToOutput('Variables: LET A=10, B=20\n');
            printToOutput('Print: PRINT "Hello", PRINT A+5\n');
            printToOutput('Control: FOR, NEXT, IF, GOTO, GOSUB, RETURN\n');
            printToOutput('--- END Help ---\n');
            updatePrompt();
        }

        function handleDirectInput(event) {
            if (event.key === 'Enter') {
                const text = state.directInput.value.trim();
                state.directInput.value = '';
                
                if (text) {
                    // Check if it's a line number
                    const lineNumMatch = text.match(/^(\d+)\s+(.+)$/);
                    if (lineNumMatch) {
                        // Add to program
                        state.codeEditor.value += text + '\n';
                        loadProgramFromEditor();
                        printToOutput(`> ${text}\n`);
                    } else {
                        // Execute as direct command
                        const programLines = state.programLines;
                        state.programLines = [text];
                        printToOutput(`>_${text}\n`);
                        processLine(text);
                        state.programLines = programLines;
                    }
                    updateLineCount();
                }
            } else if (event.key === 'Escape') {
                state.directInput.value = '';
            }
        }

        function startClock() {
            function update() {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                document.getElementById('clock').textContent = `${h}:${m}:${s}`;
            }
            update();
            setInterval(update, 1000);
        }

        // Initialize on load
        init();
        
        // Expose API for integration with uCode1
        window.C64BBCBasic = {
            print: printToOutput,
            clear: clearScreen,
            setStatus: (status) => {
                document.getElementById('status-text').textContent = status.toUpperCase();
            },
            execute: (code) => {
                processLine(code);
            }
        };
    </script>
</body>
</html>
