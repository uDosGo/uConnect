<!doctype html>
<html>
<head>
  <title>uCode1 BBC BASIC Terminal</title>
  <link href="css.css?v=20260430" rel="stylesheet">
  <link href="../display.css?v=20260430" rel="stylesheet">
  <script src="../udos-widgets.js?v=20260430"></script>
</head>
<body>

  <!-- Full-bleed dark blue background -->
  <section class="bluescreen"></section>



  <!-- + toggle icon — slides down from top-right on hover -->
  <div class="menu-toggle" id="menuToggle">+</div>

  <!-- Slide-out left panel menu -->
  <div class="menu-panel" id="menuPanel">
    <div class="menu-header">
      <span class="menu-title">VIEWPORT</span>
      <button class="menu-close" id="menuClose">x</button>
    </div>

    <div class="menu-section">
      <span class="menu-label">SIZE</span>
      <div class="menu-grid" id="sizeGrid">
        <button class="menu-btn" data-size="20x10">20x10</button>
        <button class="menu-btn" data-size="32x16">32x16</button>
        <button class="menu-btn" data-size="40x24">40x24</button>
        <button class="menu-btn" data-size="80x30">80x30</button>
        <button class="menu-btn" data-size="48x48">48x48</button>
      </div>
    </div>

    <div class="menu-section">
      <span class="menu-label">SIZE</span>
      <span class="menu-value" id="ratioDisplay">40x24</span>
    </div>

    <div class="menu-section">
      <span class="menu-label">SYSTEM</span>
      <div class="menu-info" id="sysInfo">
        <div>seed: CITY-INDEX-001</div>
        <div>cities: 83</div>
        <div>tz: 17</div>
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid #050;color:#030">CSS3 C64 | uCode1 BBC BASIC</div>
      </div>
    </div>
  </div>

  <!-- Terminal viewport -->
  <div class="terminal-viewport" id="terminal" data-surface="bbcbasic">
    <div class="terminal-output" id="output"></div>
  </div>

  <script>
    // ── Viewport presets ────────────────────────────────────────────────────
    var VIEWPORTS = {
      '20x10': { cols: 20, rows: 10, label: '20x10 TINY' },
      '32x16': { cols: 32, rows: 16, label: '32x16 NANO' },
      '40x24': { cols: 40, rows: 24, label: '40x24 COMPACT' },
      '80x30': { cols: 80, rows: 30, label: '80x30 CLASSIC' },
      '48x48': { cols: 48, rows: 48, label: '48x48 SQUARE' },
    };
    var currentViewport = '40x24';



    // ── Toolbar helpers ─────────────────────────────────────────────────────
    function applyViewport(key) {
      var vp = VIEWPORTS[key];
      if (!vp) return;
      currentViewport = key;
      uDosWidgets.Display.resize(document.getElementById('terminal'), vp.cols, vp.rows);
      document.getElementById('ratioDisplay').textContent = vp.cols + 'x' + vp.rows;
      document.querySelectorAll('.menu-btn[data-size]').forEach(function(b) {
        b.classList.toggle('active', b.dataset.size === key);
      });
      flashLoader();
      // Re-cascade content at new grid width
      cascadeBuffer();
    }

    function flashLoader() {
      var bs = document.querySelector('.bluescreen');
      if (!bs) return;
      bs.classList.add('flash');
      setTimeout(function() { bs.classList.remove('flash'); }, 600);    }


    // ── Initialize display scaling ──────────────────────────────────────────
    document.getElementById('terminal').setAttribute('data-aspect', '0.55');
    uDosWidgets.Display.init(document.getElementById('terminal'), {
      cols: 40, rows: 24
    });

    // ── Terminal content buffer + cascade ───────────────────────────────────
    var contentBuffer = [];     // array of plain-text lines (no HTML)
    var cascadeTimer = null;
    var ready = false;
    var buf = '';

    // Wrap text to fit `cols` characters per line, returns array of lines
    function wrapText(text, cols) {
      if (!text || text.length === 0) return [''];
      var lines = [];
      var words = text.split(' ');
      var cur = '';
      for (var i = 0; i < words.length; i++) {
        var w = words[i];
        if (w.length === 0) continue;
        if (cur.length === 0) {
          cur = w;
        } else if ((cur + ' ' + w).length <= cols) {
          cur += ' ' + w;
        } else {
          lines.push(cur);
          cur = w;
        }
      }
      if (cur.length > 0) lines.push(cur);
      return lines;
    }

    // Add text to buffer and cascade
    function addOutput(text) {
      // Remove leading/trailing whitespace, collapse multiple newlines
      text = text.replace(/^\s+/, '').replace(/\s+$/, '');
      var cols = (VIEWPORTS[currentViewport] || VIEWPORTS['40x24']).cols;
      var rawLines = text.split('\n');
      for (var r = 0; r < rawLines.length; r++) {
        var trimmed = rawLines[r].replace(/^\s+/, '').replace(/\s+$/, '');
        if (trimmed.length === 0) { contentBuffer.push(''); continue; }
        var wrapped = wrapText(trimmed, cols);
        for (var w = 0; w < wrapped.length; w++) {
          contentBuffer.push(wrapped[w]);
        }
      }
      cascadeBuffer();
    }

    // Cascade: clear output, redraw buffered lines top-down
    function cascadeBuffer() {
      if (cascadeTimer) { clearInterval(cascadeTimer); cascadeTimer = null; }

      var output = document.getElementById('output');
      var cursor = document.getElementById('cursorEl');
      if (!output) return;

      output.innerHTML = '';  // clear

      var lines = contentBuffer.slice();  // copy
      var idx = 0;
      var total = lines.length;
      var intervalMs = total > 0 ? Math.min(300, Math.floor(3000 / total)) : 200;

      if (total === 0) {
        // Just show prompt
        output.innerHTML = '<span class="prompt">&gt; </span><span class="cursor" id="cursorEl"></span>';
        return;
      }

      cascadeTimer = setInterval(function() {
        if (idx >= total) {
          clearInterval(cascadeTimer);
          cascadeTimer = null;
          // Add prompt after all content
          output.innerHTML += '<br><span class="prompt">&gt; </span><span class="cursor" id="cursorEl"></span>';
          return;
        }
        var line = document.createElement('div');
        line.className = 'resp';
        line.textContent = lines[idx];
        line.style.whiteSpace = 'pre';
        output.appendChild(line);
        idx++;
      }, intervalMs);
    }

    // ── Terminal setup ──────────────────────────────────────────────────────
    (function setupTerminal() {
      var output = document.getElementById('output');
      var PROMPT_HTML = '<span class="prompt">&gt; </span><span class="cursor" id="cursorEl"></span>';

      if (!output) return;

      // Boot messages — clean, no extra line breaks, wrapped to grid
      var bootLines = [
        'uCode1 *** bbc basic version 1.0 *** 64k ram 38911 bytes free',
        'display: 40x24 compact terminal font: 24px C64 mono',
        'seed pod: CITY-INDEX-001 83 cities 17 timezones loaded',
        'local tz: AEST (UTC+10) cities: Sydney Melbourne Brisbane Auckland'
      ];
      contentBuffer = contentBuffer.concat(bootLines);

      applyViewport('40x24');
      cascadeBuffer();

      // Menu toggle
      (function setupMenu() {
        var toggle = document.getElementById('menuToggle');
        var panel = document.getElementById('menuPanel');
        var closeBtn = document.getElementById('menuClose');
        var isOpen = false;

        function openPanel() {
          isOpen = true;
          panel.classList.add('open');
          toggle.textContent = 'x';
          toggle.classList.add('active');
        }

        function closePanel() {
          isOpen = false;
          panel.classList.remove('open');
          toggle.textContent = '+';
          toggle.classList.remove('active');
        }

        // Click + to open panel
        toggle.addEventListener('click', function(e) {
          e.stopPropagation();
          if (isOpen) { closePanel(); }
          else { openPanel(); }
        });

        // Click x to close panel
        closeBtn.addEventListener('click', closePanel);

        // Click outside panel to close
        document.addEventListener('click', function(e) {
          if (isOpen && !panel.contains(e.target) && e.target !== toggle) {
            closePanel();
          }
        });

        // Size buttons
        document.querySelectorAll('.menu-btn[data-size]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            applyViewport(btn.getAttribute('data-size'));
          });
        });
      })();

      // Enable input after viewport appears
      setTimeout(function() { ready = true; }, 3800);

      // ── Window resize → re-cascade content ─────────────────────────────
      var bbcResizeTimer = null;
      window.addEventListener('resize', function() {
        if (bbcResizeTimer) clearTimeout(bbcResizeTimer);
        bbcResizeTimer = setTimeout(function() { cascadeBuffer(); }, 1500);
      });

      document.addEventListener('keydown', function(e) {
        if (!ready) return;
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

        if (e.key === 'Enter') {
          var cmd = buf.trim().toUpperCase();
          contentBuffer.push('> ' + buf);

          if (cmd === 'LOAD')        addOutput('SEARCHING... LOADING');
          else if (cmd === 'RUN')    addOutput('RUNNING... OK');
          else if (cmd === 'LIST')   addOutput('10 PRINT "HELLO" 20 GOTO 10');
          else if (cmd === 'NEW')    addOutput('NEW PROGRAM CLEARED');
          else if (cmd === 'HELP')   addOutput('COMMANDS: LOAD RUN LIST NEW HELP CLS CITIES SIZE');
          else if (cmd === 'CLS')    { contentBuffer = []; cascadeBuffer(); }
          else if (cmd === 'CITIES') addOutput('SEED POD: CITY-INDEX-001 83 CITIES 17 TIMEZONES LOCAL: SYDNEY MELBOURNE BRISBANE');
          else if (cmd.indexOf('SIZE') === 0) {
            var parts = cmd.split(' ');
            if (parts.length === 2 && VIEWPORTS[parts[1]]) {
              applyViewport(parts[1]);
            } else {
              addOutput('SIZES: 20x10 32x16 40x24 80x30 48x48');
            }
          }
          else if (cmd.length > 0)   addOutput('UNKNOWN COMMAND: ' + cmd + ' (TYPE HELP)');

          buf = '';
          e.preventDefault();
        } else if (e.key === 'Backspace') {
          if (buf.length > 0) buf = buf.slice(0, -1);
          e.preventDefault();
        } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
          buf += e.key;
          e.preventDefault();
        }
      });
    })();
  </script>

</body>
</html>
