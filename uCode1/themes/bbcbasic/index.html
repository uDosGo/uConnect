<!doctype html>
<html>
<head>
  <title>uCode1 BBC BASIC Terminal</title>
  <link href="css.css?v=20260430" rel="stylesheet">
  <link href="../display.css?v=20260430" rel="stylesheet">
  <link href="../tailwind.css" rel="stylesheet">
  <script src="../udos-widgets.js?v=20260430"></script>
</head>
<body>

  <!-- Full-bleed dark blue background -->
  <section class="bluescreen"></section>



  <!-- Shared menu injected by uDosWidgets.Menu.init() -->

  <!-- Terminal viewport -->
  <div class="terminal-viewport" id="terminal" data-surface="bbcbasic">
    <div class="terminal-output" id="output"></div>
  </div>

  <script>
    // ── Viewport presets ────────────────────────────────────────────────────
    var VIEWPORTS = {
      '20x10': { cols: 20, rows: 10, label: '20x10 TINY' },
      '32x16': { cols: 32, rows: 16, label: '32x16 NANO' },
      '40x24': { cols: 40, rows: 24, label: '40x24 COMPACT' },
      '80x30': { cols: 80, rows: 30, label: '80x30 CLASSIC' },
      '48x48': { cols: 48, rows: 48, label: '48x48 SQUARE' },
    };
    var currentViewport = '40x24';



    // ── Toolbar helpers ─────────────────────────────────────────────────────
    function applyViewport(key) {
      var vp = VIEWPORTS[key];
      if (!vp) return;
      currentViewport = key;
      uDosWidgets.Display.resize(document.getElementById('terminal'), vp.cols, vp.rows);
      var rd = document.getElementById('ratioDisplay');
      if (rd) rd.textContent = vp.cols + 'x' + vp.rows;
      flashLoader();
      cascadeBuffer();
    }

    function flashLoader() {
      var bs = document.querySelector('.bluescreen');
      if (!bs) return;
      bs.classList.add('flash');
      setTimeout(function() { bs.classList.remove('flash'); }, 600);    }


    // ── Initialize display scaling ──────────────────────────────────────────
    document.getElementById('terminal').setAttribute('data-aspect', '0.55');
    uDosWidgets.Display.init(document.getElementById('terminal'), {
      cols: 40, rows: 24
    });

    // ── Terminal content buffer + cascade ───────────────────────────────────
    var contentBuffer = [];     // array of plain-text lines (no HTML)
    var cascadeTimer = null;
    var ready = false;
    var buf = '';

    // Wrap text to fit `cols` characters per line, returns array of lines
    function wrapText(text, cols) {
      if (!text || text.length === 0) return [''];
      var lines = [];
      var words = text.split(' ');
      var cur = '';
      for (var i = 0; i < words.length; i++) {
        var w = words[i];
        if (w.length === 0) continue;
        if (cur.length === 0) {
          cur = w;
        } else if ((cur + ' ' + w).length <= cols) {
          cur += ' ' + w;
        } else {
          lines.push(cur);
          cur = w;
        }
      }
      if (cur.length > 0) lines.push(cur);
      return lines;
    }

    // Add text to buffer and render immediately (no cascade — that's for resize)
    function addOutput(text) {
      var vp = document.getElementById('terminal');
      var output = document.getElementById('output');
      text = text.replace(/^\s+/, '').replace(/\s+$/, '');
      var cols = (VIEWPORTS[currentViewport] || VIEWPORTS['40x24']).cols;
      var rawLines = text.split('\n');
      for (var r = 0; r < rawLines.length; r++) {
        var trimmed = rawLines[r].replace(/^\s+/, '').replace(/\s+$/, '');
        if (trimmed.length === 0) { contentBuffer.push(''); continue; }
        var wrapped = wrapText(trimmed, cols);
        for (var w = 0; w < wrapped.length; w++) {
          contentBuffer.push(wrapped[w]);
          var div = document.createElement('div');
          div.className = 'resp';
          div.textContent = wrapped[w];
          output.appendChild(div);
        }
      }
      if (vp) vp.scrollTop = vp.scrollHeight;
    }

    // Cascade: clear output, redraw buffered lines top-down
    function cascadeBuffer() {
      if (cascadeTimer) { clearInterval(cascadeTimer); cascadeTimer = null; }

      var output = document.getElementById('output');
      if (!output) return;

      output.innerHTML = '';
      var vp = document.getElementById('terminal');

      var lines = contentBuffer.slice();
      var idx = 0;
      var total = lines.length;
      var intervalMs = total > 0 ? Math.min(300, Math.floor(3000 / total)) : 200;

      if (total === 0) {
        output.innerHTML = '<span class="prompt">&gt; </span><span class="cursor" id="cursorEl"></span>';
        return;
      }

      cascadeTimer = setInterval(function() {
        if (idx >= total) {
          clearInterval(cascadeTimer);
          cascadeTimer = null;
          output.innerHTML += '<span class="prompt">&gt; </span><span class="cursor" id="cursorEl"></span>';
          if (vp) vp.scrollTop = vp.scrollHeight;
          return;
        }
        var line = document.createElement('div');
        line.className = 'resp';
        line.textContent = lines[idx];
        line.style.whiteSpace = 'pre-wrap';
        line.style.wordBreak = 'break-word';
        output.appendChild(line);
        if (vp) vp.scrollTop = vp.scrollHeight;
        idx++;
      }, intervalMs);
    }

    // ── Terminal setup ──────────────────────────────────────────────────────
    (function setupTerminal() {
      var output = document.getElementById('output');
      var vp = document.getElementById('terminal');
      if (!output) return;

      // Boot messages — render instantly (no cascade delay for initial display)
      var bootLines = [
        'uCode1 *** bbc basic version 1.0 *** 64k ram 38911 bytes free',
        'display: 40x24 compact terminal font: 24px C64 mono',
        'seed pod: CITY-INDEX-001 83 cities 17 timezones loaded',
        'local tz: AEST (UTC+10) cities: Sydney Melbourne Brisbane Auckland'
      ];
      contentBuffer = bootLines.slice();
      output.innerHTML = '';
      bootLines.forEach(function(l) {
        var d = document.createElement('div');
        d.className = 'resp';
        d.textContent = l;
        d.style.whiteSpace = 'pre-wrap';
        d.style.wordBreak = 'break-word';
        output.appendChild(d);
      });
      output.innerHTML += '<span class="prompt">&gt; </span><span class="cursor" id="cursorEl"></span>';
      if (vp) vp.scrollTop = vp.scrollHeight;

      applyViewport('40x24');

      // ── Shared Menu ────────────────────────────────────────────────────
      var bbcFontScale = 1.0;
      function applyBbcScale() {
        document.documentElement.style.setProperty('--udos-font-scale', bbcFontScale.toFixed(2));
        // Trigger re-render by resizing the display
        var vp = VIEWPORTS[currentViewport];
        if (vp) uDosWidgets.Display.resize(document.getElementById('terminal'), vp.cols, vp.rows);
      }
      uDosWidgets.Menu.init({
        title: 'VIEWPORT',
        sections: [{
          label: 'FONT SCALE', type: 'custom',
          element: (function(){
            var d = document.createElement('div'); d.style.cssText = 'display:flex;align-items:center;gap:8px';
            var dn = document.createElement('button'); dn.className = 'menu-btn'; dn.textContent = 'A−'; dn.style.padding = '4px 10px';
            dn.addEventListener('click', function(){ bbcFontScale = Math.max(0.5, bbcFontScale - 0.1); applyBbcScale(); });
            var ds = document.createElement('span'); ds.className = 'menu-value'; ds.textContent = '1.0x'; ds.style.minWidth = '36px'; ds.style.textAlign = 'center';
            var up = document.createElement('button'); up.className = 'menu-btn'; up.textContent = 'A+'; up.style.padding = '4px 10px';
            up.addEventListener('click', function(){ bbcFontScale = Math.min(2.5, bbcFontScale + 0.1); applyBbcScale(); });
            // Wrap applyBbcScale to update display
            var orig = applyBbcScale;
            applyBbcScale = function() { orig(); ds.textContent = bbcFontScale.toFixed(1) + 'x'; };
            d.appendChild(dn); d.appendChild(ds); d.appendChild(up);
            return d;
          })()
        },{
          label: 'SIZE', type: 'grid', buttons: [
            { label:'20x10', value:'20x10', onclick: function(){applyViewport('20x10')} },
            { label:'32x16', value:'32x16', onclick: function(){applyViewport('32x16')} },
            { label:'40x24', value:'40x24', active:true, onclick: function(){applyViewport('40x24')} },
            { label:'80x30', value:'80x30', onclick: function(){applyViewport('80x30')} },
            { label:'48x48', value:'48x48', onclick: function(){applyViewport('48x48')} }
          ]
        },{
          label: 'SIZE', type: 'info', lines: ['current: 40x24']
        },{
          label: 'SYSTEM', type: 'info', lines: [
            'seed: CITY-INDEX-001',
            'cities: 83  tz: 17',
            'CSS3 C64 | uCode1 BBC BASIC'
          ]
        }]
      });
      applyBbcScale();

      // Enable input after viewport appears
      setTimeout(function() { ready = true; }, 3800);

      // ── Window resize → re-cascade content ─────────────────────────────
      var bbcResizeTimer = null;
      window.addEventListener('resize', function() {
        if (bbcResizeTimer) clearTimeout(bbcResizeTimer);
        bbcResizeTimer = setTimeout(function() { cascadeBuffer(); }, 1500);
      });

      document.addEventListener('keydown', function(e) {
        if (!ready) return;
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

        if (e.key === 'Enter') {
          var cmd = buf.trim().toUpperCase();
          contentBuffer.push('> ' + buf);
          // Render command line immediately
          var output = document.getElementById('output');
          var vp = document.getElementById('terminal');
          var cmdLine = document.createElement('div');
          cmdLine.className = 'resp';
          cmdLine.textContent = '> ' + buf;
          output.appendChild(cmdLine);
          if (vp) vp.scrollTop = vp.scrollHeight;

          if (cmd === 'LOAD')        addOutput('SEARCHING... LOADING');
          else if (cmd === 'RUN')    addOutput('RUNNING... OK');
          else if (cmd === 'LIST')   addOutput('10 PRINT "HELLO" 20 GOTO 10');
          else if (cmd === 'NEW')    addOutput('NEW PROGRAM CLEARED');
          else if (cmd === 'HELP')   addOutput('COMMANDS: LOAD RUN LIST NEW HELP CLS CITIES SIZE');
          else if (cmd === 'CLS')    { contentBuffer = []; cascadeBuffer(); }
          else if (cmd === 'CITIES') addOutput('SEED POD: CITY-INDEX-001 83 CITIES 17 TIMEZONES LOCAL: SYDNEY MELBOURNE BRISBANE');
          else if (cmd.indexOf('SIZE') === 0) {
            var parts = cmd.split(' ');
            if (parts.length === 2 && VIEWPORTS[parts[1]]) {
              applyViewport(parts[1]);
            } else {
              addOutput('SIZES: 20x10 32x16 40x24 80x30 48x48');
            }
          }
          else if (cmd.length > 0)   addOutput('UNKNOWN COMMAND: ' + cmd + ' (TYPE HELP)');

          buf = '';
          e.preventDefault();
        } else if (e.key === 'Backspace') {
          if (buf.length > 0) buf = buf.slice(0, -1);
          e.preventDefault();
        } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
          buf += e.key;
          e.preventDefault();
        }
      });
    })();
  </script>

</body>
</html>
