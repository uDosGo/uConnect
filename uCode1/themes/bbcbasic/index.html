<!doctype html>
<html>
<head>
  <title>uCode1 BBC BASIC Terminal</title>
  <link href="css.css" rel="stylesheet">
  <link href="../display.css" rel="stylesheet">
  <script src="prefixfree.min.js"></script>
  <script src="../udos-widgets.js"></script>
</head>
<body>

  <!-- Full-bleed dark blue background -->
  <section class="bluescreen"></section>

  <!-- Pulsing scramble overlay — 3 seconds then fades -->
  <div class="scramble-overlay" id="scramble">
    <div class="scramble-text" id="scrambleText"></div>
  </div>

  <!-- + toggle icon — slides down from top-right on hover -->
  <div class="menu-toggle" id="menuToggle">+</div>

  <!-- Slide-out left panel menu -->
  <div class="menu-panel" id="menuPanel">
    <div class="menu-header">
      <span class="menu-title">VIEWPORT</span>
      <button class="menu-close" id="menuClose">x</button>
    </div>

    <div class="menu-section">
      <span class="menu-label">SIZE</span>
      <div class="menu-grid" id="sizeGrid">
        <button class="menu-btn" data-size="20x10">20x10</button>
        <button class="menu-btn" data-size="32x16">32x16</button>
        <button class="menu-btn" data-size="40x16">40x16</button>
        <button class="menu-btn" data-size="40x24">40x24</button>
        <button class="menu-btn" data-size="64x16">64x16</button>
        <button class="menu-btn" data-size="64x24">64x24</button>
        <button class="menu-btn" data-size="80x24">80x24</button>
        <button class="menu-btn" data-size="80x20">80x20</button>
        <button class="menu-btn" data-size="48x48">48x48</button>
      </div>
    </div>

    <div class="menu-section">
      <span class="menu-label">SIZE</span>
      <span class="menu-value" id="ratioDisplay">80x24</span>
    </div>

    <div class="menu-section">
      <span class="menu-label">SYSTEM</span>
      <div class="menu-info" id="sysInfo">
        <div>seed: CITY-INDEX-001</div>
        <div>cities: 83</div>
        <div>tz: 17</div>
      </div>
    </div>
  </div>

  <!-- Terminal viewport — appears after scramble -->
  <div class="terminal-viewport" id="terminal" data-surface="bbcbasic">
    <div class="boot-msg" id="bootMsg">
      uCode1 <span class="highlight">***</span> bbc basic version 1.0
      <span class="highlight">***</span> 64k ram &nbsp; 38911 bytes free
    </div>
    <div class="boot-detail" id="bootDetail"></div>
    <div class="terminal-output" id="output">
      <span class="prompt">&gt; </span><span class="cursor" id="cursorEl"></span>
    </div>
  </div>

  <a href="https://pixelambacht.nl/2013/css3-c64/" class="credits">CSS3 C64 | uCode1 BBC BASIC</a>

  <script>
    // ── Viewport presets ────────────────────────────────────────────────────
    var VIEWPORTS = {
      '20x10': { cols: 20, rows: 10, label: '20x10 TINY' },
      '32x16': { cols: 32, rows: 16, label: '32x16 NANO' },
      '40x16': { cols: 40, rows: 16, label: '40x16 MICRO' },
      '40x24': { cols: 40, rows: 24, label: '40x24 COMPACT' },
      '64x16': { cols: 64, rows: 16, label: '64x16 SMALL' },
      '64x24': { cols: 64, rows: 24, label: '64x24 STANDARD' },
      '80x24': { cols: 80, rows: 24, label: '80x24 CLASSIC' },
      '80x20': { cols: 80, rows: 20, label: '80x20 WIDE' },
      '48x48': { cols: 48, rows: 48, label: '48x48 SQUARE' },
    };
    var currentViewport = '80x24';

    // ── uCode1 ASCII block logo (replaces scramble) ────────────────────────
    (function showLogo() {
      var el = document.getElementById('scrambleText');
      if (!el) return;
      var logo = [
        '<span class="line0">  ██   ██  ██████  ██████  ███████ </span>',
        '<span class="line1">  ██   ██ ██      ██      ██      </span>',
        '<span class="line2">  ███████ ██      ██      █████   </span>',
        '<span class="line3">  ██   ██ ██      ██      ██      </span>',
        '<span class="line4">  ██   ██  ██████  ██████  ███████ </span>',
        '<span class="line5">           VERSION 1.0              </span>',
      ];
      el.innerHTML = logo.join('\n');
    })();

    // ── Toolbar helpers ─────────────────────────────────────────────────────
    function applyViewport(key) {
      var vp = VIEWPORTS[key];
      if (!vp) return;
      currentViewport = key;
      uDosWidgets.Display.resize(document.getElementById('terminal'), vp.cols, vp.rows);
      document.getElementById('ratioDisplay').textContent = vp.cols + 'x' + vp.rows;
      document.querySelectorAll('.toolbar-btn[data-size]').forEach(function(b) {
        b.classList.toggle('active', b.dataset.size === key);
      });
    }


    // ── Initialize display scaling ──────────────────────────────────────────
    uDosWidgets.Display.init(document.getElementById('terminal'), {
      cols: 80, rows: 24, aspect: 0.55
    });

    // ── Terminal setup ──────────────────────────────────────────────────────
    (function setupTerminal() {
      var output = document.getElementById('output');
      var cursor = document.getElementById('cursorEl');
      var bootDetail = document.getElementById('bootDetail');
      var PROMPT = '<span class="prompt">&gt; </span>';

      if (!output || !cursor) return;

      var buf = '';
      var ready = false;

      // Boot report — includes viewport size
      bootDetail.innerHTML =
        'display: 80x24 classic terminal &mdash; font: 15px C64 mono<br/>' +
        'seed pod: CITY-INDEX-001 &mdash; ' +
        '83 cities &middot; 17 timezones loaded<br/>' +
        'local tz: AEST (UTC+10) &middot; ' +
        'cities: Sydney, Melbourne, Brisbane, Auckland';

      applyViewport('80x24');
      document.getElementById('ratioDisplay').textContent = '80x24';

      // Menu toggle — + icon slides down on top-right hover, opens panel
      (function setupMenu() {
        var toggle = document.getElementById('menuToggle');
        var panel = document.getElementById('menuPanel');
        var closeBtn = document.getElementById('menuClose');
        var isOpen = false;
        var showTimer = null;

        // Show + on hover near top-right corner (within 120px of right edge, top 60px)
        document.addEventListener('mousemove', function(e) {
          if (isOpen) return;
          var nearTopRight = (e.clientX > window.innerWidth - 120 && e.clientY < 60);
          if (nearTopRight) {
            toggle.classList.add('visible');
            clearTimeout(showTimer);
          } else {
            showTimer = setTimeout(function() { toggle.classList.remove('visible'); }, 800);
          }
        });

        // Click + to open panel
        toggle.addEventListener('click', function() {
          isOpen = true;
          panel.classList.add('open');
          toggle.textContent = 'x';
          toggle.classList.add('active');
        });

        // Click x to close panel
        function closePanel() {
          isOpen = false;
          panel.classList.remove('open');
          toggle.textContent = '+';
          toggle.classList.remove('active');
          toggle.classList.remove('visible');
        }
        closeBtn.addEventListener('click', closePanel);

        // Size buttons
        document.querySelectorAll('.menu-btn[data-size]').forEach(function(btn) {
          btn.addEventListener('click', function() {
            applyViewport(btn.getAttribute('data-size'));
          });
        });
      })();

      // Enable input after scramble + viewport transition
      setTimeout(function() { ready = true; }, 3800);

      document.addEventListener('keydown', function(e) {
        if (!ready) return;
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

        if (e.key === 'Enter') {
          var cmd = buf.trim().toUpperCase();
          var line = document.createElement('div');
          line.innerHTML = PROMPT + buf;
          output.appendChild(line);

          setTimeout(function() {
            var resp = document.createElement('div');
            resp.className = 'resp';
            if (cmd === 'LOAD') resp.textContent = 'SEARCHING...\nLOADING';
            else if (cmd === 'RUN') resp.textContent = 'RUNNING...\nOK';
            else if (cmd === 'LIST') resp.textContent = ' 10 PRINT "HELLO"\n 20 GOTO 10';
            else if (cmd === 'NEW') resp.textContent = 'NEW PROGRAM CLEARED';
            else if (cmd === 'HELP') resp.textContent = 'COMMANDS: LOAD RUN LIST NEW HELP CLS CITIES SIZE';
            else if (cmd === 'CLS') { output.innerHTML = ''; resp = null; }
            else if (cmd === 'CITIES') resp.textContent = 'SEED POD: CITY-INDEX-001\n83 CITIES, 17 TIMEZONES\nLOCAL: SYDNEY, MELBOURNE, BRISBANE';
            else if (cmd.indexOf('SIZE') === 0) {
              var parts = cmd.split(' ');
              if (parts.length === 2 && VIEWPORTS[parts[1]]) {
                applyViewport(parts[1]);
                resp.textContent = 'VIEWPORT: ' + VIEWPORTS[parts[1]].label;
              } else {
                resp.textContent = 'VIEWPORT: ' + currentViewport;
                resp.innerHTML += '<br/>SIZE 20x10 | SIZE 32x16 | SIZE 40x16 | SIZE 40x24<br/>SIZE 64x16 | SIZE 64x24 | SIZE 80x24 | SIZE 80x20 | SIZE 48x48';
              }
            }
            else if (cmd) { resp.className = 'error'; resp.textContent = '?UNKNOWN COMMAND'; }
            else resp = null;
            if (resp) output.appendChild(resp);
            var p = document.createElement('div');
            p.innerHTML = PROMPT;
            p.appendChild(cursor);
            output.appendChild(p);
            output.scrollTop = output.scrollHeight;
          }, 120);
          buf = '';
          e.preventDefault();
        } else if (e.key === 'Backspace') {
          if (buf.length > 0) {
            buf = buf.slice(0, -1);
            var last = output.lastElementChild;
            if (last && last.innerHTML && last.innerHTML.indexOf(PROMPT) === 0) {
              last.innerHTML = PROMPT + buf;
              last.appendChild(cursor);
            }
          }
          e.preventDefault();
        } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
          buf += e.key;
          var last = output.lastElementChild;
          if (last && last.innerHTML && last.innerHTML.indexOf(PROMPT) === 0) {
            last.innerHTML = PROMPT + buf;
            last.appendChild(cursor);
          }
          e.preventDefault();
        }
      });
    })();
  </script>

</body>
</html>
