<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Surface - uDosConnect</title>
  <meta name="description" content="Browser Surface with centered search bar">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    body { background: #0d1117; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div class="w-full max-w-4xl px-6">
    <header class="text-center mb-12">
      <h1 class="text-5xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-emerald-400">
        Browser Surface
      </h1>
      <p class="text-gray-400 mt-4 text-lg">Centered search experience</p>
    </header>

    <main class="space-y-8">
      <!-- Centered Search Bar -->
      <div class="relative max-w-2xl mx-auto">
        <div class="absolute inset-y-0 left-0 pl-6 flex items-center pointer-events-none">
          <span class="text-2xl text-gray-400">🔍</span>
        </div>
        <input 
          type="text" 
          id="search-input"
          class="w-full py-5 pl-14 pr-14 text-xl bg-[#161b22] border border-gray-700 rounded-full text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all duration-200"
          placeholder="Search the web..."
          autocomplete="off"
          autofocus
        >
        <div class="absolute inset-y-0 right-0 pr-6 flex items-center">
          <button id="search-btn" class="text-xl text-gray-400 hover:text-cyan-400 transition-colors">↩️</button>
        </div>
      </div>

      <!-- Quick Action Buttons -->
      <div class="flex justify-center gap-4 flex-wrap">
        <button onclick="quickSearch('google.com')" class="px-6 py-3 bg-[#1c2333] border border-gray-700 rounded-lg text-gray-300 hover:bg-cyan-900/30 hover:border-cyan-500 transition-all duration-200 flex items-center gap-2">
          <span>🔎</span> Google
        </button>
        <button onclick="quickSearch('github.com')" class="px-6 py-3 bg-[#1c2333] border border-gray-700 rounded-lg text-gray-300 hover:bg-purple-900/30 hover:border-purple-500 transition-all duration-200 flex items-center gap-2">
          <span>⚡</span> GitHub
        </button>
        <button onclick="quickSearch('youtube.com')" class="px-6 py-3 bg-[#1c2333] border border-gray-700 rounded-lg text-gray-300 hover:bg-red-900/30 hover:border-red-500 transition-all duration-200 flex items-center gap-2">
          <span>▶️</span> YouTube
        </button>
        <button onclick="quickSearch('wikipedia.org')" class="px-6 py-3 bg-[#1c2333] border border-gray-700 rounded-lg text-gray-300 hover:bg-gray-700 hover:border-gray-500 transition-all duration-200 flex items-center gap-2">
          <span>📚</span> Wikipedia
        </button>
      </div>

      <!-- Search Results Area -->
      <div id="results" class="mt-12 min-h-[200px]"></div>
    </main>

    <footer class="text-center mt-16 text-gray-500 text-sm">
      <p>Browser Surface · uDosConnect</p>
      <p class="mt-1">Press Enter to search or use quick action buttons</p>
    </footer>
  </div>

  <script>
    const searchInput = document.getElementById('search-input');
    const searchBtn = document.getElementById('search-btn');
    const resultsDiv = document.getElementById('results');

    function performSearch() {
      const query = searchInput.value.trim();
      if (!query) return;
      
      // Use Google search as default
      window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
    }

    function quickSearch(domain) {
      const query = searchInput.value.trim();
      const url = query ? `https://www.${domain}/search?q=${encodeURIComponent(query)}` : `https://www.${domain}`;
      window.location.href = url;
    }

    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        performSearch();
      }
    });

    searchBtn.addEventListener('click', performSearch);

    // Focus input on page load
    window.addEventListener('load', () => {
      searchInput.focus();
    });
  </script>
</body>
</html>
