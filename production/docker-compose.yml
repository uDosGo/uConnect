# uDos Production Docker Compose Configuration
# Containerized deployment for production environments

version: '3.8'

services:
  # uDos Core Service
  udos-core:
    image: udos/core:latest
    build:
      context: .
      dockerfile: core/Dockerfile
    container_name: udos-core
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/udos.db
      - REDIS_HOST=udos-redis
      - REDIS_PORT=6379
    volumes:
      - udos-data:/data
      - ./config:/app/config
    ports:
      - "3000:3000"
    networks:
      - udos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      udos-redis:
        condition: service_healthy

  # uDos UI Service
  udos-ui:
    image: udos/ui:latest
    build:
      context: .
      dockerfile: ui/Dockerfile
    container_name: udos-ui
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - VITE_API_BASE_URL=http://udos-core:3000
    ports:
      - "8080:80"
    networks:
      - udos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Sonic-Screwdriver CLI
  udos-sonic:
    image: udos/sonic:latest
    build:
      context: .
      dockerfile: tools/sonic-express/Dockerfile
    container_name: udos-sonic
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - udos-data:/data
      - ./config:/app/config
    networks:
      - udos-network
    command: ["sonic", "start", "--background"]

  # Redis Cache
  udos-redis:
    image: redis:7-alpine
    container_name: udos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - udos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Webhook Server
  udos-webhook:
    image: udos/sonic:latest
    container_name: udos-webhook
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - WEBHOOK_PORT=8081
    ports:
      - "8081:8081"
    networks:
      - udos-network
    command: ["sonic", "webhook:start", "--port", "8081"]

  # Monitoring (Optional)
  udos-monitor:
    image: prom/node-exporter:latest
    container_name: udos-monitor
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - udos-network
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

# Networks
networks:
  udos-network:
    driver: bridge

# Volumes
volumes:
  udos-data:
    driver: local
  redis-data:
    driver: local