# .cleanup.yaml
categories:
  dev-docs:
    patterns: ["DEV_*.md", "FINAL_*.md", "CURRENT_*.md", "DSC2_*.md", "A2_*.md", "A3_*.md"]
    action: move_to_archive
    archive_path: ".archive/dev-docs/"
    
  temp-summaries:
    patterns: ["*_SUMMARY.md", "*_REPORT.md", "*_IMPLEMENTATION.md"]
    action: delete_if_duplicate
    keep_newest: true
    
  debug-scripts:
    patterns: ["debug_*.js", "debug_*.py", "test_*.tmp"]
    action: delete
    
  build-artifacts:
    patterns: ["exports/", "distro/", "cdn/", ".cache/"]
    type: directory
    action: delete
    
  duplicate-md:
    pattern: "*.md"
    action: deduplicate
    algorithm: content_hash
    keep: oldest