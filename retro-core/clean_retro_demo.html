<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Retro Demo - ThinUI Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .toolbar {
            width: 100%;
            max-width: 1200px;
            background: #2a2a2a;
            padding: 12px 20px;
            border-radius: 8px 8px 0 0;
            margin-bottom: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo {
            font-size: 1.5em;
            font-weight: bold;
            color: #67B6BD;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
        
        .toolbar-right {
            display: flex;
            gap: 10px;
        }
        
        .theme-selector {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .theme-label {
            color: #999;
            font-size: 0.9em;
        }
        
        select {
            background: #333;
            color: white;
            border: 1px solid #444;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        select:hover {
            border-color: #67B6BD;
        }
        
        button {
            background: #333;
            color: white;
            border: 1px solid #444;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #444;
            border-color: #67B6BD;
        }
        
        .retro-container {
            width: 100%;
            max-width: 1200px;
            background: #000;
            border: 4px solid #333;
            border-radius: 0 0 8px 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        #retro-canvas {
            display: block;
            image-rendering: pixelated;
            width: 100%;
            height: 480px;  /* 30 rows × 16px = 480px */
        }
        
        .status-bar {
            width: 100%;
            max-width: 1200px;
            background: #2a2a2a;
            padding: 10px 20px;
            border-radius: 0 0 8px 8px;
            margin-top: 0;
            text-align: left;
            color: #999;
            font-size: 0.9em;
        }
        
        .status-icon {
            color: #4caf50;
            margin-right: 8px;
        }
        
        @media (max-width: 768px) {
            .toolbar {
                flex-direction: column;
                gap: 10px;
            }
            
            .toolbar-left {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <!-- ThinUI-style Toolbar -->
    <div class="toolbar">
        <div class="toolbar-left">
            <div class="logo">⎔ ThinUI</div>
            <div class="theme-selector">
                <span class="theme-label">Theme:</span>
                <select id="theme-select">
                    <option value="c64">C64 (Commodore 64)</option>
                    <option value="nes">NES (Nintendo)</option>
                    <option value="teletext">Teletext</option>
                </select>
            </div>
        </div>
        <div class="toolbar-right">
            <button id="clear-btn">Clear</button>
            <button id="demo-btn">Demo</button>
        </div>
    </div>
    
    <!-- Retro Canvas - Centered -->
    <div class="retro-container">
        <canvas id="retro-canvas"></canvas>
    </div>
    
    <!-- Status Bar -->
    <div class="status-bar">
        <span class="status-icon">✓</span>
        <span id="status">Pure JavaScript retro renderer - No server needed!</span>
    </div>
    
    <script>
        // Clean Retro Renderer - ThinUI Style
        
        const canvas = document.getElementById('retro-canvas');
        const ctx = canvas.getContext('2d');
        const themeSelect = document.getElementById('theme-select');
        const clearBtn = document.getElementById('clear-btn');
        const demoBtn = document.getElementById('demo-btn');
        
        // Current theme
        let currentTheme = 'c64';
        
        // Character size - 16px (good balance)
        const CHAR_WIDTH = 16;
        const CHAR_HEIGHT = 16;
        
        // C64 color palette (NTSC)
        const c64Colors = [
            '#000000', '#FFFFFF', '#883932', '#67B6BD',
            '#8B3F96', '#55A049', '#40318D', '#C8C569',
            '#8B542C', '#554000', '#B86962', '#6E6E6E',
            '#969696', '#75CE66', '#6F5E91', '#A9A9A9'
        ];
        
        // NES color palette
        const nesColors = [
            '#666666', '#002688', '#1412A7', '#3B00A4',
            '#5C007E', '#6E0040', '#6C0600', '#561D00',
            '#333500', '#0B4800', '#005100', '#004F08',
            '#004747', '#000000', '#000000', '#000000'
        ];
        
        // Teletext color palette
        const teletextColors = [
            '#000000', '#FF0000', '#00FF00', '#FFFF00',
            '#0000FF', '#FF00FF', '#00FFFF', '#FFFFFF'
        ];
        
        // Get current palette
        function getPalette() {
            if (currentTheme === 'c64') return c64Colors;
            if (currentTheme === 'nes') return nesColors;
            return teletextColors;
        }
        
        // Character definitions
        function drawChar(x, y, char, colorIndex) {
            const palette = getPalette();
            ctx.fillStyle = palette[colorIndex] || '#FFFFFF';
            
            if (char === 32) {
                // Space
            } else if (char === 65) { // 'A'
                ctx.fillRect(x + 4, y + 2, 8, 2);
                ctx.fillRect(x + 2, y + 4, 12, 2);
                ctx.fillRect(x, y + 6, 16, 2);
                ctx.fillRect(x + 2, y + 8, 4, 2);
                ctx.fillRect(x + 10, y + 8, 4, 2);
            } else if (char === 66) { // 'B'
                ctx.fillRect(x + 2, y + 2, 12, 2);
                ctx.fillRect(x, y + 4, 4, 2);
                ctx.fillRect(x, y + 6, 12, 2);
                ctx.fillRect(x, y + 8, 4, 2);
                ctx.fillRect(x + 2, y + 10, 12, 2);
            } else if (char === 67) { // 'C'
                ctx.fillRect(x + 4, y + 2, 8, 2);
                ctx.fillRect(x + 2, y + 4, 4, 2);
                ctx.fillRect(x + 2, y + 6, 4, 2);
                ctx.fillRect(x + 2, y + 8, 4, 2);
                ctx.fillRect(x + 4, y + 10, 8, 2);
            } else {
                // Default block
                ctx.fillRect(x + 2, y + 6, 12, 4);
            }
        }
        
        // Clear screen
        function clearScreen() {
            ctx.fillStyle = getPalette()[0];
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        // Draw border
        function drawBorder() {
            const borderColor = currentTheme === 'c64' ? '#67B6BD' : 
                              currentTheme === 'nes' ? '#002688' : '#FF0000';
            ctx.strokeStyle = borderColor;
            ctx.lineWidth = 2;
            ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);
        }
        
        // Draw demo pattern
        function drawDemo() {
            clearScreen();
            drawBorder();
            
            // Draw title at the top
            const title = "ThinUI Retro";
            let startX = Math.floor((50 - title.length) / 2) * CHAR_WIDTH;
            for (let i = 0; i < title.length; i++) {
                drawChar(startX + i * CHAR_WIDTH, CHAR_HEIGHT, title.charCodeAt(i), 1);
            }
            
            // Draw a symmetrical grid system (40x24 content area)
            const GRID_WIDTH = 40;
            const GRID_HEIGHT = 24;
            const GRID_START_X = Math.floor((50 - GRID_WIDTH) / 2);
            const GRID_START_Y = 4;
            
            // Draw grid border
            ctx.strokeStyle = '#67B6BD';
            ctx.lineWidth = 2;
            ctx.strokeRect(
                GRID_START_X * CHAR_WIDTH, 
                GRID_START_Y * CHAR_HEIGHT, 
                GRID_WIDTH * CHAR_WIDTH, 
                GRID_HEIGHT * CHAR_HEIGHT
            );
            
            // Fill grid with symmetrical pattern
            for (let y = 0; y < GRID_HEIGHT; y++) {
                for (let x = 0; x < GRID_WIDTH; x++) {
                    // Symmetrical pattern based on distance from center
                    const centerX = GRID_WIDTH / 2;
                    const centerY = GRID_HEIGHT / 2;
                    const dist = Math.sqrt(
                        Math.pow(x - centerX, 2) + 
                        Math.pow(y - centerY, 2)
                    );
                    
                    // Create concentric rings of patterns
                    const ring = Math.floor(dist / 5);
                    const pattern = (x + y + ring * 3) % 3;
                    
                    let charCode;
                    let colorIndex;
                    
                    if (pattern === 0) {
                        charCode = 65; // A
                        colorIndex = 3; // Cyan
                    } else if (pattern === 1) {
                        charCode = 66; // B
                        colorIndex = 5; // Purple
                    } else {
                        charCode = 67; // C
                        colorIndex = 7; // White
                    }
                    
                    const screenX = (GRID_START_X + x) * CHAR_WIDTH;
                    const screenY = (GRID_START_Y + y) * CHAR_HEIGHT;
                    drawChar(screenX, screenY, charCode, colorIndex);
                }
            }
            
            // Draw title centered at top
            const title = "ThinUI Retro";
            let startX = Math.floor((50 - title.length) / 2) * CHAR_WIDTH;
            for (let i = 0; i < title.length; i++) {
                drawChar(startX + i * CHAR_WIDTH, 1 * CHAR_HEIGHT, title.charCodeAt(i), 1);
            }
            
            updateStatus();
        }
        
        function updateStatus() {
            const themes = {c64: 'C64', nes: 'NES', teletext: 'Teletext'};
            document.getElementById('status').textContent = 
                `Active theme: ${themes[currentTheme]} - Ready!`;
        }
        
        // Event listeners
        themeSelect.addEventListener('change', () => {
            currentTheme = themeSelect.value;
            drawDemo();
        });
        
        clearBtn.addEventListener('click', () => {
            clearScreen();
            drawBorder();
            document.getElementById('status').textContent = 'Screen cleared - Ready for input';
        });
        
        demoBtn.addEventListener('click', drawDemo);
        
        // Initialize
        ctx.imageSmoothingEnabled = false;
        drawDemo();
    </script>
</body>
</html>
