<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Large Retro Demo - 24px Characters</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        
        h1 {
            color: #ff4444;
            font-size: 2em;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        #canvas-container {
            background: #000;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        #retro-canvas {
            background: #000;
            display: block;
            margin: 0 auto;
            border: 6px solid #333;
            image-rendering: pixelated;
            width: 1200px;
            height: 720px;
        }
        
        .status {
            padding: 15px;
            background: #1e1e1e;
            border-radius: 8px;
            font-family: monospace;
            margin: 20px 0;
            color: #4caf50;
            font-size: 1.2em;
        }
        
        .controls {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        button {
            background: #333;
            color: white;
            border: none;
            padding: 15px 25px;
            margin: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 1.1em;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #444;
            transform: scale(1.05);
        }
        
        button.active {
            background: #ff4444;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Large Retro Demo (24px)</h1>
        
        <div class="status" id="status">
            Status: Pure JavaScript - Big retro characters! 🎉
        </div>
        
        <div class="controls">
            <button id="c64-btn" class="active">C64 Theme</button>
            <button id="nes-btn">NES Theme</button>
            <button id="teletext-btn">Teletext Theme</button>
            <button id="clear-btn">Clear Screen</button>
            <button id="demo-btn">Run Demo</button>
        </div>
        
        <div id="canvas-container">
            <canvas id="retro-canvas" width="1200" height="720"></canvas>
        </div>
    </div>
    
    <script>
        // Large Retro Renderer - 24px characters
        
        const canvas = document.getElementById('retro-canvas');
        const ctx = canvas.getContext('2d');
        
        // Current theme
        let currentTheme = 'c64';
        
        // Character size - 24px as requested
        const CHAR_WIDTH = 24;
        const CHAR_HEIGHT = 24;
        
        // C64 color palette (NTSC) - uDos style
        const c64Colors = [
            '#000000', '#FFFFFF', '#883932', '#67B6BD',
            '#8B3F96', '#55A049', '#40318D', '#C8C569',
            '#8B542C', '#554000', '#B86962', '#6E6E6E',
            '#969696', '#75CE66', '#6F5E91', '#A9A9A9'
        ];
        
        // NES color palette
        const nesColors = [
            '#666666', '#002688', '#1412A7', '#3B00A4',
            '#5C007E', '#6E0040', '#6C0600', '#561D00',
            '#333500', '#0B4800', '#005100', '#004F08',
            '#004747', '#000000', '#000000', '#000000'
        ];
        
        // Teletext color palette
        const teletextColors = [
            '#000000', '#FF0000', '#00FF00', '#FFFF00',
            '#0000FF', '#FF00FF', '#00FFFF', '#FFFFFF'
        ];
        
        // Get current palette
        function getPalette() {
            if (currentTheme === 'c64') return c64Colors;
            if (currentTheme === 'nes') return nesColors;
            return teletextColors;
        }
        
        // Large character definitions (24px)
        function drawChar(x, y, char, colorIndex) {
            const palette = getPalette();
            ctx.fillStyle = palette[colorIndex] || '#FFFFFF';
            
            // Large retro-style characters
            if (char === 32) {
                // Space - do nothing
            } else if (char === 65) { // 'A' - large
                ctx.fillRect(x + 6, y + 3, 12, 6);
                ctx.fillRect(x + 3, y + 9, 18, 6);
                ctx.fillRect(x + 3, y + 15, 6, 6);
                ctx.fillRect(x + 15, y + 15, 6, 6);
            } else if (char === 66) { // 'B' - large
                ctx.fillRect(x + 3, y + 3, 18, 6);
                ctx.fillRect(x + 3, y + 9, 18, 6);
                ctx.fillRect(x + 3, y + 15, 18, 6);
                ctx.fillRect(x + 9, y + 9, 6, 6);
            } else if (char === 67) { // 'C' - large
                ctx.fillRect(x + 6, y + 3, 12, 6);
                ctx.fillRect(x + 3, y + 9, 6, 6);
                ctx.fillRect(x + 3, y + 15, 6, 6);
                ctx.fillRect(x + 6, y + 21, 12, 6);
            } else {
                // Default block - large
                ctx.fillRect(x + 3, y + 9, 18, 12);
            }
        }
        
        // Clear screen
        function clearScreen() {
            ctx.fillStyle = getPalette()[0];
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        // Draw border
        function drawBorder() {
            const borderColor = currentTheme === 'c64' ? '#67B6BD' : 
                              currentTheme === 'nes' ? '#002688' : '#FF0000';
            ctx.strokeStyle = borderColor;
            ctx.lineWidth = 6;
            ctx.strokeRect(3, 3, canvas.width - 6, canvas.height - 6);
        }
        
        // Draw demo pattern
        function drawDemo() {
            clearScreen();
            drawBorder();
            
            // Draw title - large text
            const title = currentTheme.toUpperCase() + " RETRO";
            let startX = Math.floor((50 - title.length) / 2) * CHAR_WIDTH;
            for (let i = 0; i < title.length; i++) {
                drawChar(startX + i * CHAR_WIDTH, CHAR_HEIGHT * 2, title.charCodeAt(i), 1);
            }
            
            // Draw larger test pattern
            for (let y = 6; y < 20; y++) {
                for (let x = 2; x < 48; x++) {
                    const colorIndex = (x + y * 3) % 16;
                    const charCode = [65, 66, 67][(x + y) % 3];
                    drawChar(x * CHAR_WIDTH, y * CHAR_HEIGHT, charCode, colorIndex);
                }
            }
            
            document.getElementById('status').textContent = 
                'Status: ' + currentTheme.toUpperCase() + ' - Large characters! 🎉';
        }
        
        // Set up buttons
        document.getElementById('c64-btn').addEventListener('click', () => {
            currentTheme = 'c64';
            document.getElementById('c64-btn').classList.add('active');
            document.getElementById('nes-btn').classList.remove('active');
            document.getElementById('teletext-btn').classList.remove('active');
            drawDemo();
        });
        
        document.getElementById('nes-btn').addEventListener('click', () => {
            currentTheme = 'nes';
            document.getElementById('c64-btn').classList.remove('active');
            document.getElementById('nes-btn').classList.add('active');
            document.getElementById('teletext-btn').classList.remove('active');
            drawDemo();
        });
        
        document.getElementById('teletext-btn').addEventListener('click', () => {
            currentTheme = 'teletext';
            document.getElementById('c64-btn').classList.remove('active');
            document.getElementById('nes-btn').classList.remove('active');
            document.getElementById('teletext-btn').classList.add('active');
            drawDemo();
        });
        
        document.getElementById('clear-btn').addEventListener('click', () => {
            clearScreen();
            drawBorder();
            document.getElementById('status').textContent = 'Status: Screen cleared.';
        });
        
        document.getElementById('demo-btn').addEventListener('click', () => {
            drawDemo();
        });
        
        // Initialize with pixel-perfect rendering
        ctx.imageSmoothingEnabled = false;
        
        // Set font for retro feel
        document.body.style.fontSize = '24px';
        
        // Start demo
        drawDemo();
    </script>
</body>
</html>
