<!DOCTYPE html>
<html>
<head>
    <title>Perfect Retro Demo</title>
    <style>
        body {
            background: #1a1a1a;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        canvas {
            background: #000;
            border: 4px solid #333;
            image-rendering: pixelated;
        }
        
        .toolbar {
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        
        button {
            padding: 10px 20px;
            background: #333;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button onclick="loadDemo()">Load Demo</button>
    </div>
    
    <canvas id="canvas" width="800" height="600"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function loadDemo() {
            // Clear with black
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 800, 600);
            
            // Draw title
            ctx.fillStyle = '#67B6BD';
            ctx.font = '32px Courier New';
            ctx.fillText('ThinUI - Perfect Demo', 50, 50);
            
            // Draw a simple, clean grid
            const cols = 50;
            const rows = 25;
            const cellWidth = 16;
            const cellHeight = 24;
            
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    // Simple alternating pattern
                    ctx.fillStyle = (x + y) % 2 === 0 ? '#67B6BD' : '#8B3F96';
                    ctx.fillRect(
                        x * cellWidth,
                        100 + y * cellHeight,
                        cellWidth,
                        cellHeight
                    );
                }
            }
            
            // Draw border
            ctx.strokeStyle = '#67B6BD';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 98, 800, 24 * 25 + 4);
        }
        
        // Load on startup
        loadDemo();
    </script>
</body>
</html>
