# uDos Documentation Publishing Configuration
version: 1

targets:
  - name: "docs-site"
    type: "github_pages"
    repo: "uDosGo/docs"
    branch: "gh-pages"
    source_dir: "."
    clean: true
    
  - name: "docs-vault"
    type: "vault_sync"
    path: "$UDOS_VAULT/docs"
    format: "markdown"
    include: ["*.md", "*.pdf"]
    exclude: ["*.dev.md", ".DS_Store"]

options:
  default_target: "docs-site"
  verbose: false
  dry_run: false

# Publishing workflow
workflow:
  - name: "build"
    run: "make build-docs"
    
  - name: "validate"
    run: "./health-check.sh --docs"
    
  - name: "publish"
    run: "publishlane {{target.name}} ."

# Documentation structure
structure:
  index: "README.md"
  sections:
    - title: "Getting Started"
      path: "guides/"
      order: 10
    
    - title: "Reference"
      path: "reference/"
      order: 20
    
    - title: "Development"
      path: "dev/"
      order: 30
    
    - title: "Specifications"
      path: "specs/"
      order: 40

# Theme configuration for GitHub Pages
theme:
  name: "just-the-docs"
  version: "latest"
  
  features:
    - navigation.instant
    - navigation.expand
    - search.highlight
    
  color_scheme: "udos"
  
  callouts:
    note:
      title: "Note"
      color: "blue"
    
    warning:
      title: "Warning"
      color: "yellow"
    
    danger:
      title: "Danger"
      color: "red"

# SEO configuration
seo:
  title: "uDos Documentation"
  description: "Unified Development Operating System"
  keywords: "udos, development, operating system, rust, tauri"
  
  twitter:
    card: "summary_large_image"
    site: "@uDosGo"
    
  opengraph:
    type: "website"
    locale: "en_US"

# Analytics (optional)
analytics:
  google: "UA-XXXXXX-X"
  plausible: "udosgo.example.com"

# Redirects
redirects:
  - from: "/old-path.html"
    to: "/new-path.html"
    code: 301

# Ignore patterns
ignore:
  - ".dev.md"
  - ".DS_Store"
  - "*.log"
  - "node_modules/"
  - "target/"

# Build settings
build:
  output: "_site"
  
  markdown:
    processor: "kramdown"
    
    kramdown:
      input: "GFM"
      hard_wrap: false
      syntax_highlighter: "rouge"
      
  assets:
    compress: true
    
    exclude:
      - ".gitkeep"
      - "*.psd"

# Deployment settings
deploy:
  method: "git"
  
  git:
    branch: "gh-pages"
    message: "Update documentation [skip ci]"
    
    commit:
      name: "uDos Bot"
      email: "bot@udosgo.example.com"

# Notification settings
notifications:
  slack:
    webhook: "https://hooks.slack.com/services/..."
    channel: "#docs"
    
  email:
    to: "docs@udosgo.example.com"
    from: "bot@udosgo.example.com"

# Validation rules
validation:
  required_files:
    - "README.md"
    - "LICENSE"
    - "CONTRIBUTING.md"
  
  link_checker:
    enabled: true
    exclude:
      - "localhost"
      - "127.0.0.1"

# Versioning
version:
  file: "VERSION"
  format: "semver"
  
  changelog:
    file: "CHANGELOG.md"
    format: "keepachangelog"

# Internationalization (future)
i18n:
  enabled: false
  default_locale: "en"
  locales: ["en", "es", "fr", "de", "ja"]