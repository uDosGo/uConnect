<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro PTY Server Test Client</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        
        h1 {
            color: #333;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .mode-button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        
        .mode-button.active {
            background-color: #45a049;
            font-weight: bold;
        }
        
        #terminal {
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 4px;
            height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            border: 1px solid #3e3e3e;
        }
        
        #input {
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            border: 1px solid #3e3e3e;
            border-radius: 4px;
            background-color: #2d2d2d;
            color: #d4d4d4;
            width: 100%;
        }
        
        .status {
            padding: 10px;
            background-color: #2d2d2d;
            color: #d4d4d4;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }
        
        .connected {
            color: #4CAF50;
        }
        
        .disconnected {
            color: #f44336;
        }
    </style>
</head>
<body>
    <h1>🖥️ Micro PTY Server Test Client</h1>
    
    <div class="container">
        <div class="mode-selector">
            <button class="mode-button active" onclick="selectMode('embed')">Embed Mode</button>
            <button class="mode-button" onclick="selectMode('c64')">C64 Mode</button>
            <button class="mode-button" onclick="selectMode('panel_1')">Panel Mode</button>
        </div>
        
        <div class="status" id="status">
            Status: <span class="disconnected">Disconnected</span>
        </div>
        
        <div id="terminal"></div>
        
        <input 
            type="text" 
            id="input" 
            placeholder="Type commands here... (help, exit, clear, date)" 
            onkeypress="handleKeyPress(event)"
        >
    </div>
    
    <script>
        let socket = null;
        let currentMode = 'embed';
        
        function selectMode(mode) {
            currentMode = mode;
            
            // Update button styles
            document.querySelectorAll('.mode-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Reconnect with new mode
            if (socket) {
                socket.close();
            }
            connect();
        }
        
        function connect() {
            const url = `ws://localhost:3001/pty/${currentMode}`;
            
            socket = new WebSocket(url);
            
            socket.onopen = () => {
                updateStatus('connected');
                log('🔌 Connected to Micro PTY Server');
                log(`Mode: ${currentMode}`);
            };
            
            socket.onmessage = (event) => {
                log(event.data);
            };
            
            socket.onclose = () => {
                updateStatus('disconnected');
                log('🔴 Connection closed');
            };
            
            socket.onerror = (error) => {
                updateStatus('disconnected');
                log('❌ WebSocket error: ' + error.message);
            };
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                const input = document.getElementById('input');
                const text = input.value;
                
                if (text.trim() !== '') {
                    if (socket && socket.readyState === WebSocket.OPEN) {
                        socket.send(text);
                    } else {
                        log('⚠️ Not connected to server');
                    }
                    input.value = '';
                }
            }
        }
        
        function log(message) {
            const terminal = document.getElementById('terminal');
            terminal.textContent += message + '\n';
            terminal.scrollTop = terminal.scrollHeight;
        }
        
        function updateStatus(status) {
            const statusElement = document.getElementById('status');
            const span = statusElement.querySelector('span');
            
            span.textContent = status.charAt(0).toUpperCase() + status.slice(1);
            span.className = status;
        }
        
        // Connect when page loads
        window.onload = connect;
        
        // Auto-reconnect if connection drops
        setInterval(() => {
            if (socket && socket.readyState !== WebSocket.OPEN) {
                connect();
            }
        }, 5000);
    </script>
</body>
</html>
