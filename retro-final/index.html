<!DOCTYPE html>
<html>
<head>
    <title>Retro Final - Working Version</title>
    <style>
        body { 
            background: #1a1a1a; 
            font-family: monospace; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
        }
        
        #canvas { 
            background: #000; 
            border: 4px solid #333; 
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="800" height="600"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Simple working demo
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, 800, 600);
        
        // Draw title
        ctx.fillStyle = '#67B6BD';
        ctx.font = '32px Courier New';
        ctx.fillText('ThinUI - Final Working Version', 50, 50);
        
        // Draw grid
        for (let y = 0; y < 25; y++) {
            for (let x = 0; x < 50; x++) {
                ctx.fillStyle = (x + y) % 2 === 0 ? '#67B6BD' : '#8B3F96';
                ctx.fillRect(x * 16, 100 + y * 24, 16, 24);
            }
        }
    </script>
</body>
</html>
